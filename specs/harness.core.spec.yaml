# yaml-language-server: $schema=../spec-schema.json
# SpecGate component: harness.core
#
# The harness core pipeline. Parses a spec, resolves its binding,
# delegates to a language backend for test generation, runs the
# generated tests, collects JSON results, and emits a run report.
#
# This is a StateMachine spec — the harness holds state (registered
# backends) that operations depend on.
#
# All cases use a mock backend registered during construction.
# Language-specific codegen is tested by harness.rust and harness.csharp.

name: harness.core
binding:
  name: rust
  target: test
depends_on:
  - core.spec_document
  - core.binding_document

# State variables — what SpecCapture getters expose
state:
  backends: Set<string>

# Initial state — what SpecSetup (Harness::new) produces
init:
  backends: [mock]

# Operations
operations:
  register_backend:
    inputs:
      name:
        type: string
        desc: Name to register the backend under (e.g., "rust", "csharp")
      backend:
        type: Backend
        desc: Backend implementation to register
  run_spec:
    inputs:
      spec_path:
        type: string
        desc: Path to the .spec.yaml file to run
    outcome:
      oneof: [Complete, Error]
    outputs:
      when Complete:
        report: RunReport
      when Error:
        error: RunError

types:
  Backend:
    oneof:
      RustBackend: {}

  CaseResult:
    name: string
    status: string
    duration_ms: int

  RunReport:
    spec_name: string
    binding: string
    timestamp: string
    duration_ms: int
    results: List<CaseResult>
    passed: int
    failed: int
    total: int

  RunError:
    causes:
      SpecNotFound: { path: string }
      SpecInvalid: { detail: string }
      BindingNotFound: { binding: string }
      BackendNotFound: { language: string }
      GenerateFailed: { detail: string }
      BuildFailed: { detail: string }

# Invariants — candidates for specgate propose-invariants
# (manually listed here as the starting set, pending tooling)
invariants:
  mock_always_registered: "\"mock\" ∈ backends"
  at_least_one_backend: "backends.size() >= 1"

cases:

  # ===== Backend registration =====

  - name: register_adds_to_backends
    desc: Registering a backend adds its name to the backends set
    steps:
      - operation: register_backend
        inputs:
          name: rust
          backend:
            RustBackend: {}
        assert_state:
          backends: [mock, rust]

  - name: register_idempotent
    desc: Registering a backend with an existing name replaces it silently
    steps:
      - operation: register_backend
        inputs:
          name: rust
          backend:
            RustBackend: {}
        assert_state:
          backends: [mock, rust]
      - operation: register_backend
        inputs:
          name: rust
          backend:
            RustBackend: {}
        assert_state:
          backends: [mock, rust]

  # ===== Happy path =====

  - name: single_case_pass
    desc: One spec case where the mock backend reports pass
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/simple_pass.spec.yaml
        expected:
          outcome: Complete
          report:
            passed: 1
            failed: 0
            total: 1
            results:
              - { name: basic_case, status: pass }

  - name: single_case_fail
    desc: One spec case where the mock backend reports fail
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/simple_fail.spec.yaml
        expected:
          outcome: Complete
          report:
            passed: 0
            failed: 1
            total: 1
            results:
              - { name: basic_case, status: fail }

  - name: multiple_cases_mixed
    desc: Three cases — two pass, one fails
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/multi_mixed.spec.yaml
        expected:
          outcome: Complete
          report:
            passed: 2
            failed: 1
            total: 3

  - name: all_cases_pass
    desc: All cases pass — report reflects full success
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/multi_pass.spec.yaml
        expected:
          outcome: Complete
          report:
            passed: 3
            failed: 0
            total: 3

  # ===== Setup errors =====

  - name: spec_not_found
    desc: Spec file does not exist
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/nonexistent.spec.yaml
        expected:
          outcome: Error
          error:
            SpecNotFound: { path: fixtures/nonexistent.spec.yaml }

  - name: spec_invalid_yaml
    desc: Spec file exists but is not valid YAML
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/bad_yaml.spec.yaml
        expected:
          outcome: Error
          error:
            SpecInvalid: {}

  - name: binding_not_found
    desc: Fixture spec references a binding that does not exist
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/bad_binding.spec.yaml
        expected:
          outcome: Error
          error:
            BindingNotFound: { binding: nonexistent }

  - name: backend_not_found
    desc: Fixture spec's binding declares a language with no registered backend
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/unknown_lang.spec.yaml
        expected:
          outcome: Error
          error:
            BackendNotFound: { language: unknown_lang }

  # ===== Build and codegen errors =====

  - name: generate_fails
    desc: Backend fails to generate test code
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/generate_error.spec.yaml
        expected:
          outcome: Error
          error:
            GenerateFailed: {}

  - name: build_fails
    desc: Generated test code fails to compile
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/build_error.spec.yaml
        expected:
          outcome: Error
          error:
            BuildFailed: {}

  # ===== Report structure =====

  - name: report_includes_metadata
    desc: Report includes spec name, binding, and timestamp
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/simple_pass.spec.yaml
        expected:
          outcome: Complete
          report:
            spec_name: simple_pass
            binding: mock

  - name: empty_cases_vacuous_pass
    desc: Spec with no cases produces a report with zero results
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/no_cases.spec.yaml
        expected:
          outcome: Complete
          report:
            passed: 0
            failed: 0
            total: 0
            results: []

  - name: default_binding
    desc: Spec with no binding field defaults to mock backend
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/no_binding.spec.yaml
        expected:
          outcome: Complete
          report:
            binding: mock
            passed: 1
            total: 1

  - name: all_cases_fail
    desc: All cases fail — report reflects full failure
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/all_fail.spec.yaml
        expected:
          outcome: Complete
          report:
            passed: 0
            failed: 2
            total: 2

  - name: binding_invalid_schema
    desc: Binding file is valid YAML but does not match binding schema
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/bad_binding_schema.spec.yaml
        expected:
          outcome: Error
          error:
            SpecInvalid: {}

  - name: mixed_results_ordering
    desc: Results appear in the same order as spec cases
    steps:
      - operation: run_spec
        inputs:
          spec_path: fixtures/multi_mixed.spec.yaml
        expected:
          outcome: Complete
          report:
            results:
              - { name: alpha_case, status: pass }
              - { name: beta_case, status: fail }
              - { name: gamma_case, status: pass }
