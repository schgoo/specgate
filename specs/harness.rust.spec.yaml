# yaml-language-server: $schema=../spec-schema.json
# SpecGate component: harness.rust
#
# The Rust codegen backend. Given a parsed spec and binding, generates
# a Rust integration test file (tests/specgate_generated.rs) that:
# - Calls spec_setup functions with case input values
# - Invokes spec_operation entry points
# - Drains the annotation trace stream (specgate::runtime::drain_traces)
# - Compares the actual trace stream against the spec's expected traces
#   via JSON equality — the generator has zero domain knowledge
# - Writes structured JSON output for cross-language tooling
#
# Traces are the sole source of truth for conformance in annotation-based
# mode. The generated test never accesses fields, return values, or state
# directly. All actual values come from the trace stream, which captures
# OperationEnter/Exit, CaptureBefore/After, Checkpoint, and MockCall events.
#
# Two target modes are supported:
# 1. Annotation-based (function target): spec references annotated code
#    via SpecOperation/SpecSetup/SpecCapture/SpecCheckpoint/SpecMock.
#    The generator resolves symbols from annotations.json and emits
#    direct function calls. Assertions compare trace streams only.
# 2. Command/API target: spec declares an API entry point directly
#    (e.g. a public function with typed input/output). No annotations
#    needed — the generator emits code that calls the function,
#    serializes the return value, and matches against expected output.
#    This is used for specs whose system under test is a library API
#    with structured return types (e.g. harness.core testing itself).

name: harness.rust
binding:
  name: rust
  target: test-generate
depends_on:
  - core.spec_document
  - core.binding_document

inputs:
  spec:
    type: ParsedSpec
    desc: Parsed spec with types, inputs, outputs, and cases
  annotations:
    type: List<Annotation>
    desc: Extracted annotations from the implementation

types:
  GeneratedFile:
    path: string
    content: string

  GenerateError:
    causes:
      MissingSetup: { operation: string }
      MissingCapture: { operation: string }
      UnsupportedType: { type_name: string, detail: string }

outcome:
  oneof: [Ok, Error]

outputs:
  when Ok:
    files: List<GeneratedFile>
  when Error:
    errors: List<GenerateError>

cases:

  # ===== Basic codegen =====

  - name: stateless_operation
    desc: Generates test for a Stateless operation with setup and capture
    inputs:
      spec:
        name: calc
        cases:
          - { name: basic_add, inputs: { a: 2, b: 3 }, expected: { outcome: Ok, result: 5 } }
      annotations:
        - SpecOperation: { operation: calc, kind: Stateless, symbol: "calc::Calculator::add" }
        - SpecSetup: { operation: calc, name: default, symbol: "calc::setup_calc" }
        - SpecCapture: { operation: calc, symbol: "calc::Calculator::result" }
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  - name: statemachine_operation
    desc: Generates test for a StateMachine with before/after capture
    inputs:
      spec:
        name: breaker
        cases:
          - name: trip_on_failure
            inputs: { success: false }
            expected: { outcome: Ok, state: open, failure_count: 1 }
      annotations:
        - SpecOperation: { operation: breaker, kind: StateMachine, symbol: "cb::CircuitBreaker::on_result" }
        - SpecSetup: { operation: breaker, name: default, symbol: "cb::setup_breaker" }
        - SpecCapture: { operation: breaker, symbol: "cb::CircuitBreaker::state" }
        - SpecCapture: { operation: breaker, symbol: "cb::CircuitBreaker::failure_count" }
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  - name: sequence_with_checkpoints
    desc: Generates test for a Sequence operation with checkpoint draining
    inputs:
      spec:
        name: pipeline
        cases:
          - name: two_step
            inputs: { input: hello }
            expected: { outcome: Ok, checkpoints: [validated, parsed] }
      annotations:
        - SpecOperation: { operation: pipeline, kind: Sequence, symbol: "pipe::Pipeline::process" }
        - SpecSetup: { operation: pipeline, name: default, symbol: "pipe::setup_pipeline" }
        - SpecCheckpoint: { operation: pipeline, symbol: "pipe::Pipeline::validate" }
        - SpecCheckpoint: { operation: pipeline, symbol: "pipe::Pipeline::parse" }
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  # ===== Mock injection =====

  - name: mock_injection
    desc: Generates test that injects mock return values from case inputs
    inputs:
      spec:
        name: fetch
        cases:
          - name: success_response
            inputs: { url: "https://example.com", mock_backend: { status: 200, body: ok } }
            expected: { outcome: Ok, status: 200 }
      annotations:
        - SpecOperation: { operation: fetch, kind: Stateless, symbol: "http::Fetcher::fetch" }
        - SpecSetup: { operation: fetch, name: default, symbol: "http::setup_fetcher" }
        - SpecMock: { operation: fetch, name: backend, symbol: "http::Fetcher::call_backend" }
        - SpecCapture: { operation: fetch, symbol: "http::FetchResult::status" }
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  # ===== Multiple cases =====

  - name: multiple_cases_one_file
    desc: All cases generate into a single test file with one function per case
    inputs:
      spec:
        name: calc
        cases:
          - { name: add_positive, inputs: { a: 2, b: 3 }, expected: { outcome: Ok, result: 5 } }
          - { name: add_negative, inputs: { a: -1, b: 1 }, expected: { outcome: Ok, result: 0 } }
          - { name: add_zero, inputs: { a: 0, b: 0 }, expected: { outcome: Ok, result: 0 } }
      annotations:
        - SpecOperation: { operation: calc, kind: Stateless, symbol: "calc::Calculator::add" }
        - SpecSetup: { operation: calc, name: default, symbol: "calc::setup_calc" }
        - SpecCapture: { operation: calc, symbol: "calc::Calculator::result" }
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  # ===== Struct-level capture =====

  - name: struct_level_capture
    desc: Struct-level spec_capture generates code to read all public fields
    inputs:
      spec:
        name: fetch
        cases:
          - name: basic_fetch
            inputs: { url: "https://example.com" }
            expected: { outcome: Ok, status_code: 200, body: ok }
      annotations:
        - SpecOperation: { operation: fetch, kind: Stateless, symbol: "http::fetch" }
        - SpecSetup: { operation: fetch, name: default, symbol: "http::setup_fetch" }
        - SpecCapture: { operation: fetch, symbol: "http::FetchResult", capture_all: true }
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  # ===== Error cases =====

  - name: missing_setup
    desc: Operation has no setup function — cannot generate test
    inputs:
      spec:
        name: calc
        cases:
          - { name: basic, inputs: { a: 1 }, expected: { outcome: Ok } }
      annotations:
        - SpecOperation: { operation: calc, kind: Stateless, symbol: "calc::add" }
    expected:
      outcome: Error
      errors:
        - MissingSetup: { operation: calc }

  - name: missing_capture
    desc: StateMachine operation has no capture — cannot observe state
    inputs:
      spec:
        name: breaker
        cases:
          - { name: trip, inputs: { success: false }, expected: { outcome: Ok } }
      annotations:
        - SpecOperation: { operation: breaker, kind: StateMachine, symbol: "cb::on_result" }
        - SpecSetup: { operation: breaker, name: default, symbol: "cb::setup" }
    expected:
      outcome: Error
      errors:
        - MissingCapture: { operation: breaker }

  # ===== JSON output =====

  - name: generates_json_output
    desc: Generated test writes JSON output file alongside assertions
    inputs:
      spec:
        name: calc
        cases:
          - { name: basic, inputs: { a: 1, b: 2 }, expected: { outcome: Ok, result: 3 } }
      annotations:
        - SpecOperation: { operation: calc, kind: Stateless, symbol: "calc::add" }
        - SpecSetup: { operation: calc, name: default, symbol: "calc::setup" }
        - SpecCapture: { operation: calc, symbol: "calc::Result::value" }
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  # ===== Inline checkpoint =====

  - name: inline_checkpoint
    desc: Inline spec_checkpoint! generates code to drain thread-local log
    inputs:
      spec:
        name: pipeline
        cases:
          - name: with_inline
            inputs: { input: hello }
            expected: { outcome: Ok, checkpoints: [count_42] }
      annotations:
        - SpecOperation: { operation: pipeline, kind: Sequence, symbol: "pipe::process" }
        - SpecSetup: { operation: pipeline, name: default, symbol: "pipe::setup" }
        - SpecCheckpoint: { operation: pipeline, symbol: "pipe::process::checkpoint_1" }
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  # ===== Command/API target =====
  # These cases test the non-annotation codegen path. The spec's target
  # field resolves to a named target in the binding file. Command targets
  # define a shell command; API targets define a function + constructor.
  # The generator emits code accordingly — no annotations needed.

  - name: api_target_simple
    desc: Generates test that calls a public API function directly via binding target
    inputs:
      spec:
        name: harness.core
        target: api
        binding: rust
        cases:
          - name: single_pass
            inputs: { spec_path: "fixtures/simple_pass.spec.yaml" }
            expected: { outcome: Complete, report: { passed: 1, failed: 0, total: 1 } }
      annotations: []
      binding_target:
        kind: api
        function: "specgate_harness::Harness::run_spec"
        constructor: "specgate_harness::Harness::new"
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  - name: api_target_error_variant
    desc: Generates test that asserts an error variant from a binding API target
    inputs:
      spec:
        name: harness.core
        target: api
        binding: rust
        cases:
          - name: spec_not_found
            inputs: { spec_path: "fixtures/nonexistent.spec.yaml" }
            expected: { outcome: Error, error: { SpecNotFound: { path: "fixtures/nonexistent.spec.yaml" } } }
      annotations: []
      binding_target:
        kind: api
        function: "specgate_harness::Harness::run_spec"
        constructor: "specgate_harness::Harness::new"
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  - name: api_target_multiple_cases
    desc: Multiple cases for a binding API target all land in one test file
    inputs:
      spec:
        name: harness.core
        target: api
        binding: rust
        cases:
          - name: pass_case
            inputs: { spec_path: "fixtures/simple_pass.spec.yaml" }
            expected: { outcome: Complete, report: { passed: 1, total: 1 } }
          - name: fail_case
            inputs: { spec_path: "fixtures/simple_fail.spec.yaml" }
            expected: { outcome: Complete, report: { passed: 0, failed: 1, total: 1 } }
          - name: not_found
            inputs: { spec_path: "fixtures/nonexistent.spec.yaml" }
            expected: { outcome: Error, error: { SpecNotFound: {} } }
      annotations: []
      binding_target:
        kind: api
        function: "specgate_harness::Harness::run_spec"
        constructor: "specgate_harness::Harness::new"
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  - name: command_target_simple
    desc: Generates test that runs a shell command and parses JSON output
    inputs:
      spec:
        name: harness.core
        target: test
        binding: rust
        cases:
          - name: single_pass
            inputs: { spec_path: "fixtures/simple_pass.spec.yaml" }
            expected: { outcome: Complete, report: { passed: 1, total: 1 } }
      annotations: []
      binding_target:
        kind: command
        command: "./target/debug/specgate run {spec_path}"
        outputs:
          stdout: json
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  - name: command_target_error_exit
    desc: Command with nonzero exit still parses stderr/stdout for error JSON
    inputs:
      spec:
        name: harness.core
        target: test
        binding: rust
        cases:
          - name: spec_not_found
            inputs: { spec_path: "fixtures/nonexistent.spec.yaml" }
            expected: { outcome: Error, error: { SpecNotFound: { path: "fixtures/nonexistent.spec.yaml" } } }
      annotations: []
      binding_target:
        kind: command
        command: "./target/debug/specgate run {spec_path}"
        outputs:
          stdout: json
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  - name: command_target_mixed_outcomes
    desc: Command target handles cases with different outcomes in one file
    inputs:
      spec:
        name: harness.core
        target: test
        binding: rust
        cases:
          - name: pass_case
            inputs: { spec_path: "fixtures/simple_pass.spec.yaml" }
            expected: { outcome: Complete, report: { passed: 1 } }
          - name: not_found
            inputs: { spec_path: "fixtures/nonexistent.spec.yaml" }
            expected: { outcome: Error, error: { SpecNotFound: {} } }
          - name: invalid_yaml
            inputs: { spec_path: "fixtures/bad_yaml.spec.yaml" }
            expected: { outcome: Error, error: { SpecInvalid: {} } }
      annotations: []
      binding_target:
        kind: command
        command: "./target/debug/specgate run {spec_path}"
        outputs:
          stdout: json
    expected:
      outcome: Ok
      files:
        - path: tests/specgate_generated.rs

  - name: command_target_missing_command
    desc: Command target in binding without command field fails generation
    inputs:
      spec:
        name: harness.core
        target: test
        binding: rust
        cases:
          - name: basic
            inputs: { spec_path: "fixtures/simple_pass.spec.yaml" }
            expected: { outcome: Complete }
      annotations: []
      binding_target:
        kind: command
    expected:
      outcome: Error
      errors:
        - UnsupportedType: { type_name: "binding_target", detail: "command target requires command field" }

  - name: api_target_missing_function
    desc: API target in binding without function field fails generation
    inputs:
      spec:
        name: harness.core
        target: api
        binding: rust
        cases:
          - name: basic
            inputs: { spec_path: "fixtures/simple_pass.spec.yaml" }
            expected: { outcome: Complete }
      annotations: []
      binding_target:
        kind: api
    expected:
      outcome: Error
      errors:
        - UnsupportedType: { type_name: "binding_target", detail: "api target requires function field" }
