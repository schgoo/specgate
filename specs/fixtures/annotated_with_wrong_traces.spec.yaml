# yaml-language-server: $schema=../../spec-schema.json
# Fixture: annotated spec where expected traces deliberately DON'T match.
# Used by harness.core case `traces_mismatch_reported` to verify that
# the harness correctly reports traces_match: false when actuals differ.
name: annotated.traces
binding:
  name: rust
  target: test-harness
outcome: Complete
outputs:
  when Complete:
    count: int
cases:
  - name: increment_once
    desc: Same annotated counter, but expected traces have wrong values.
    expected:
      outcome: Complete
      count: 1
      traces:
        - OperationEnter: { operation: annotated.traces, symbol: "specgate_harness::traced_counter::TracedCounter::increment" }
        - CaptureBefore: { operation: annotated.traces, field: count, value: "999" }
        - CaptureAfter: { operation: annotated.traces, field: count, value: "1000" }
        - OperationExit: { operation: annotated.traces, symbol: "specgate_harness::traced_counter::TracedCounter::increment" }
