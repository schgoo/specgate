# yaml-language-server: $schema=../spec-schema.json
# SpecGate component: core.spec_document
#
# Defines the shape of a valid .spec.yaml file. This is SpecGate's spec
# format, specified using SpecGate's own type system.
#
# The Rust SpecDocument struct (rust/crates/specgate-types/src/spec_document.rs)
# and the JSON Schema (spec-schema.json) must be consistent with the
# type definitions in this file.
#
# Consumer specs declare `depends_on: [core.spec_document]` if they rely
# on SpecDocument/SpecCase types.

name: core.spec_document
binding: ../bindings/rust.yaml

types:

  # === Top-level document ===

  SpecDocument:
    name: string
    binding: string                          # optional — path to a binding YAML file (relative)
    depends_on: List<string>                 # optional — names of other specs this depends on
    cases: List<SpecCase>                    # required — at least one case for executable specs
    # The following are tolerated by the schema for self-describing specs
    # (this file uses some of them) but are NOT part of the standard
    # fixture-spec authoring path. New specs should use case-level
    # `operation` / `setup` / `expected` exclusively.
    inputs: Map<string, InputDeclaration>    # optional, legacy
    outcome: Value                           # optional, legacy
    outputs: Map<string, Value>              # optional, legacy
    types: Map<string, TypeDefinition>       # optional, legacy

  InputDeclaration:
    type: string
    source: string                           # optional
    desc: string                             # optional

  TypeDefinition:
    oneof: Map<string, Value>                # optional — variant type
    causes: Map<string, Value>               # optional — error/cause type
    fields: Map<string, string>              # optional — record type

  # === Test cases ===

  SpecCase:
    name: string                             # required, snake_case unique within file
    desc: string                             # required
    operation: string                        # required for single-step cases
    setup: SetupRef                          # optional — string name or alias->name map
    inputs: Map<string, Value>               # optional — bound to setup/operation params
    expected: List<ExpectedEntry>            # required — subsequence matched against trace
    steps: List<TestStep>                    # optional — mutually exclusive with operation
    postconditions: List<Postcondition>      # optional

  # A SetupRef is either a single setup function name (string), or a
  # map of alias -> setup function name for multi-setup cases.
  SetupRef:
    oneof:
      Single: string
      Multi: Map<string, string>

  # Each entry in `expected` is a single-key map. The key is either:
  #   - the special key `run` whose value is an operation name (Run match), or
  #   - a trace event name whose value is the expected stringified value (Event match).
  ExpectedEntry:
    oneof:
      Run: { run: string }
      Event: Map<string, string>              # exactly one entry, key=name, value=stringified value

  TestStep:
    operation: string                        # required

  Postcondition:
    target: string                           # required — binding target name; must exit 0
    inputs: Map<string, string>              # optional — template vars substituted
    desc: string                             # optional

cases:

  # === Minimal valid spec ===

  - name: minimal_pure_function
    desc: Single case with operation, inputs, expected — the canonical shape
    operation: validate
    inputs:
      yaml: |
        name: fixture.stateless_add
        binding: binding.yaml
        cases:
          - name: add_2_3
            desc: Adding 2 + 3 returns 5
            operation: add
            inputs: { a: 2, b: 3 }
            expected:
              - add.result: "5"
    expected:
      - validate.outcome: "Valid"

  - name: state_machine_with_setup
    desc: Case names a setup function and asserts a subsequence of events and runs
    operation: validate
    inputs:
      yaml: |
        name: fixture.statemachine_counter
        binding: binding.yaml
        cases:
          - name: increment_once
            desc: Incrementing counter from 0 produces count 1
            setup: make_counter
            operation: increment
            expected:
              - count: "0"
              - run: increment
              - count: "1"
    expected:
      - validate.outcome: "Valid"

  - name: multi_step_case
    desc: Multi-step case uses steps and a single flat expected subsequence
    operation: validate
    inputs:
      yaml: |
        name: fixture.multi_step
        binding: binding.yaml
        cases:
          - name: increment_then_decrement
            desc: Count goes 0 to 1 to 0
            setup: make_counter
            steps:
              - operation: increment
              - operation: decrement
            expected:
              - count: "0"
              - run: increment
              - count: "1"
              - run: decrement
              - count: "0"
    expected:
      - validate.outcome: "Valid"

  - name: multi_setup_case
    desc: Setup may be a map of alias to setup function for multi-object cases
    operation: validate
    inputs:
      yaml: |
        name: fixture.multi_setup
        binding: binding.yaml
        cases:
          - name: transfer
            desc: Two setups create source and target
            setup:
              source: make_source
              target: make_target
            operation: transfer
            inputs: { amount: 50 }
            expected:
              - source.balance: "100"
              - target.balance: "0"
              - run: transfer
              - source.balance: "50"
              - target.balance: "50"
    expected:
      - validate.outcome: "Valid"

  - name: subsequence_with_gaps
    desc: Expected omits intermediate events — subsequence allows gaps
    operation: validate
    inputs:
      yaml: |
        name: fixture.subsequence_with_gaps
        binding: binding.yaml
        cases:
          - name: double_increment
            desc: Assert count=0 then count=2, skipping count=1
            setup: make_counter
            operation: increment_twice
            expected:
              - count: "0"
              - count: "2"
    expected:
      - validate.outcome: "Valid"

  - name: mock_inputs_table
    desc: Mock response table goes under inputs.<mock_name>
    operation: validate
    inputs:
      yaml: |
        name: fixture.mock_field
        binding: binding.yaml
        cases:
          - name: find_user_1
            desc: Mock db returns Alice
            setup: make_service
            operation: get_user
            inputs:
              id: "user_1"
              db:
                "user_1": "Alice"
            expected:
              - run: get_user
              - db.request: "user_1"
              - db.response: "Alice"
              - get_user.result: "Alice"
    expected:
      - validate.outcome: "Valid"

  - name: depends_on_list
    desc: A spec may declare depends_on for shared-type dependencies
    operation: validate
    inputs:
      yaml: |
        name: fixture.consumer
        binding: binding.yaml
        depends_on:
          - core.spec_document
        cases:
          - name: trivial
            desc: Trivial case
            operation: noop
            expected:
              - run: noop
    expected:
      - validate.outcome: "Valid"

  - name: binding_optional
    desc: A spec without a binding still parses (binding is optional)
    operation: validate
    inputs:
      yaml: |
        name: fixture.bindingless
        cases:
          - name: trivial
            desc: Trivial
            operation: noop
            expected:
              - run: noop
    expected:
      - validate.outcome: "Valid"

  # === Negative cases ===

  - name: reject_missing_name
    desc: name is required at the top level
    operation: validate
    inputs:
      yaml: |
        binding: binding.yaml
        cases:
          - name: c
            desc: d
            operation: op
            expected:
              - op.result: "1"
    expected:
      - validate.outcome: "Invalid"
      - validate.error: "missing required field: name"

  - name: reject_missing_cases
    desc: cases is required at the top level
    operation: validate
    inputs:
      yaml: |
        name: fixture.no_cases_field
        binding: binding.yaml
    expected:
      - validate.outcome: "Invalid"
      - validate.error: "missing required field: cases"

  - name: reject_case_missing_desc
    desc: Each case requires both name and desc
    operation: validate
    inputs:
      yaml: |
        name: fixture.bad_case
        binding: binding.yaml
        cases:
          - name: no_desc
            operation: op
            expected:
              - op.result: "1"
    expected:
      - validate.outcome: "Invalid"

  - name: reject_expected_as_map
    desc: Case `expected` must be a list of single-entry maps, not a map
    operation: validate
    inputs:
      yaml: |
        name: fixture.expected_as_map
        binding: binding.yaml
        cases:
          - name: bad
            desc: Uses map-form expected
            operation: op
            expected:
              op.result: "1"
    expected:
      - validate.outcome: "Invalid"

  - name: reject_case_with_operation_and_steps
    desc: A case cannot have both operation and steps
    operation: validate
    inputs:
      yaml: |
        name: fixture.both
        binding: binding.yaml
        cases:
          - name: bad
            desc: Has both operation and steps
            operation: op
            steps:
              - operation: op
            expected:
              - op.result: "1"
    expected:
      - validate.outcome: "Invalid"
