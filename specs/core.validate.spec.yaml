# yaml-language-server: $schema=../spec-schema.json
# SpecGate component: core.validate
#
# Given annotations extracted from source code and type metadata,
# validate they form structurally correct operations per the
# role-kind matrix and completeness rules.

name: core.validate
binding: rust
target: validate

inputs:
  annotations:
    type: List<Annotation>
  types:
    type: List<TypeInfo>

types:
  TypeInfo:
    fields:
      name: string
      is_abstract: bool
      has_generator: bool

  Annotation:
    oneof:
      SpecOperation: { operation: string, kind: string, symbol: string, parameter_types: List<string> }
      SpecSetup: { operation: string, name: string, symbol: string, params: List<string>, returns: string }
      SpecCheckpoint: { operation: string, symbol: string, accessibility: string }
      SpecState: { operation: string, symbol: string }
      SpecMock: { operation: string, symbol: string, mock_name: string }

  ValidationError:
    oneof:
      MissingEntryPoint: { operation: string }
      DuplicateEntryPoint: { operation: string }
      IncompleteOperation: { operation: string }
      InvalidRoleForKind: { operation: string, symbol: string }
      ConflictingParamNames: { operation: string }
      OrphanAnnotation: { operation: string, symbol: string }
      DuplicateMockName: { operation: string }
      DuplicateSetupName: { operation: string, name: string }

  ValidationWarning:
    oneof:
      AbstractTypeNoGenerator: { operation: string }
      PrivateCheckpoint: { symbol: string }
      AmbiguousConstruction: { operation: string, type: string }

outcome:
  oneof: [Valid, Invalid]

outputs:
  when Valid:
    warnings: List<ValidationWarning>
  when Invalid:
    errors: List<ValidationError>
    warnings: List<ValidationWarning>

# Role-kind validity matrix
#            Stateless  SM   Seq  ErrMap  Structural
# Setup        ✓        ✓    ✓     ✓       ✗
# State        ✗        ✓    ✗     ✗       ✗
# Chkpt        ✗        ✗    ✓     ✗       ✗
# Mock         ✓        ✓    ✓     ✓       ✗

# -------------------------------------------------------------------
# Cases
# -------------------------------------------------------------------
cases:

  # ===== VALID =====

  - name: validate_pure_minimal
    desc: A single SpecOperation with no roles is the simplest valid input
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
    expected:
      outcome: Valid
      warnings: []

  - name: validate_sequence_all_roles
    desc: Sequence with every allowed role — Setup, Mock, Checkpoint
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Sequence, symbol: entry }
        - SpecSetup: { operation: op_a, name: ctor, symbol: ctor, params: [x, y] }
        - SpecSetup: { operation: op_a, name: prop_a, symbol: prop_a }
        - SpecSetup: { operation: op_a, name: env_a, symbol: env_a }
        - SpecMock:  { operation: op_a, symbol: dep_a, mock_name: svc }
        - SpecCheckpoint:  { operation: op_a, symbol: chk_a }
    expected:
      outcome: Valid
      warnings: []

  - name: validate_statemachine_with_state
    desc: StateMachine satisfies completeness when it has at least one State
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: StateMachine }
        - SpecState:     { operation: op_a, symbol: state_a }
    expected:
      outcome: Valid
      warnings: []

  - name: validate_two_independent_operations
    desc: Two operations in the same input both valid — no cross-operation interference
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecOperation: { operation: op_b, kind: Stateless }
    expected:
      outcome: Valid
      warnings: []

  - name: validate_one_symbol_two_operations
    desc: Same symbol annotated for two different operations is allowed
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecOperation: { operation: op_b, kind: Stateless }
        - SpecSetup: { operation: op_a, name: shared, symbol: shared_ctor, params: [x] }
        - SpecSetup: { operation: op_b, name: shared, symbol: shared_ctor, params: [x] }
    expected:
      outcome: Valid
      warnings: []

  - name: validate_structural
    desc: Structural kind needs only the entry point — no roles allowed
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Structural }
    expected:
      outcome: Valid
      warnings: []

  - name: validate_method_as_dependency
    desc: A method can serve as a dependency (not just injected services)
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecMock: { operation: op_a, symbol: rng, mock_name: rng }
    expected:
      outcome: Valid
      warnings: []

  - name: validate_errormap
    desc: ErrorMap is a valid kind with no required roles
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: ErrorMap }
    expected:
      outcome: Valid
      warnings: []

  - name: validate_empty_input
    desc: Empty annotation list is vacuously valid — nothing to validate
    inputs:
      annotations: []
    expected:
      outcome: Valid
      warnings: []

  # ===== ERRORS =====

  - name: missing_entry_point
    desc: Annotations reference an operation that has no SpecOperation — missing entry point
    inputs:
      annotations:
        - SpecSetup: { operation: op_a, name: ctor, symbol: ctor }
    expected:
      outcome: Invalid
      errors:
        - MissingEntryPoint: { operation: op_a }

  - name: duplicate_entry_point
    desc: Two SpecOperations for the same operation name — only one allowed
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless, symbol: entry_1 }
        - SpecOperation: { operation: op_a, kind: Sequence, symbol: entry_2 }
    expected:
      outcome: Invalid
      errors:
        - DuplicateEntryPoint: { operation: op_a }

  - name: sequence_missing_checkpoint
    desc: Sequence requires at least one Checkpoint to be complete
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Sequence }
    expected:
      outcome: Invalid
      errors:
        - IncompleteOperation: { operation: op_a }

  - name: statemachine_missing_state
    desc: StateMachine requires at least one State to be complete
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: StateMachine }
    expected:
      outcome: Invalid
      errors:
        - IncompleteOperation: { operation: op_a }

  - name: state_on_pure
    desc: State is only valid on StateMachine — invalid on Pure
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecState: { operation: op_a, symbol: x }
    expected:
      outcome: Invalid
      errors:
        - InvalidRoleForKind: { operation: op_a, symbol: x }

  - name: checkpoint_on_statemachine
    desc: Checkpoint is only valid on Sequence — invalid on StateMachine
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: StateMachine }
        - SpecState: { operation: op_a, symbol: s }
        - SpecCheckpoint: { operation: op_a, symbol: c }
    expected:
      outcome: Invalid
      errors:
        - InvalidRoleForKind: { operation: op_a, symbol: c }

  - name: state_on_sequence
    desc: State is only valid on StateMachine — invalid on Sequence
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Sequence }
        - SpecCheckpoint: { operation: op_a, symbol: c }
        - SpecState: { operation: op_a, symbol: s }
    expected:
      outcome: Invalid
      errors:
        - InvalidRoleForKind: { operation: op_a, symbol: s }

  - name: checkpoint_on_stateless
    desc: Checkpoint is only valid on Sequence — invalid on Stateless
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecCheckpoint: { operation: op_a, symbol: c }
    expected:
      outcome: Invalid
      errors:
        - InvalidRoleForKind: { operation: op_a, symbol: c }

  - name: setup_on_structural
    desc: Structural forbids all runtime roles — Setup not allowed
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Structural }
        - SpecSetup: { operation: op_a, name: x, symbol: x }
    expected:
      outcome: Invalid
      errors:
        - InvalidRoleForKind: { operation: op_a, symbol: x }

  - name: mock_on_structural
    desc: Structural forbids all runtime roles — Mock not allowed
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Structural }
        - SpecMock: { operation: op_a, symbol: x, mock_name: svc }
    expected:
      outcome: Invalid
      errors:
        - InvalidRoleForKind: { operation: op_a, symbol: x }

  - name: conflicting_param_names
    desc: Two setups contributing the same param name creates ambiguity
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecSetup: { operation: op_a, name: ctor_1, symbol: ctor_1, params: [tenant] }
        - SpecSetup: { operation: op_a, name: ctor_2, symbol: ctor_2, params: [tenant] }
    expected:
      outcome: Invalid
      errors:
        - ConflictingParamNames: { operation: op_a }

  - name: orphan_typo
    desc: Annotation references op_A but entry point is op_a — likely typo, orphan
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecCheckpoint: { operation: op_A, symbol: c }
    expected:
      outcome: Invalid
      errors:
        - OrphanAnnotation: { operation: op_A, symbol: c }

  - name: duplicate_mock_name
    desc: Two mocks on the same operation with the same mock_name
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecMock: { operation: op_a, symbol: dep_1, mock_name: svc }
        - SpecMock: { operation: op_a, symbol: dep_2, mock_name: svc }
    expected:
      outcome: Invalid
      errors:
        - DuplicateMockName: { operation: op_a }

  - name: duplicate_setup_name
    desc: Two setups on the same operation with the same name
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecSetup: { operation: op_a, name: default, symbol: setup_1, params: [x] }
        - SpecSetup: { operation: op_a, name: default, symbol: setup_2, params: [y] }
    expected:
      outcome: Invalid
      errors:
        - DuplicateSetupName: { operation: op_a, name: default }

  - name: multiple_errors_same_operation
    desc: StateMachine missing State and Checkpoint invalid for kind — both reported
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: StateMachine }
        - SpecCheckpoint: { operation: op_a, symbol: c }
    expected:
      outcome: Invalid
      errors:
        - IncompleteOperation: { operation: op_a }
        - InvalidRoleForKind: { operation: op_a, symbol: c }

  - name: one_valid_one_invalid_overall_invalid
    desc: op_a is fine but op_b (Sequence, no Checkpoint) fails — overall result is Invalid
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecOperation: { operation: op_b, kind: Sequence }
    expected:
      outcome: Invalid
      errors:
        - IncompleteOperation: { operation: op_b }

  - name: multiple_orphans_zero_entry_points
    desc: No entry points at all — every annotation is an orphan
    inputs:
      annotations:
        - SpecSetup: { operation: op_a, name: ctor, symbol: ctor }
        - SpecSetup: { operation: op_b, name: env, symbol: env }
    expected:
      outcome: Invalid
      errors:
        - MissingEntryPoint: { operation: op_a }
        - MissingEntryPoint: { operation: op_b }

  # ===== WARNINGS =====

  - name: abstract_type_no_generator
    desc: Abstract type in parameter_types without a generator — warn about unconstructable input
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless, parameter_types: [T1] }
      types:
        - { name: T1, is_abstract: true, has_generator: false }
    expected:
      outcome: Valid
      warnings:
        - AbstractTypeNoGenerator: { operation: op_a }

  - name: abstract_type_with_generator_no_warning
    desc: Abstract type has a generator — no warning needed
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless, parameter_types: [T1] }
      types:
        - { name: T1, is_abstract: true, has_generator: true }
    expected:
      outcome: Valid
      warnings: []

  - name: private_checkpoint
    desc: Checkpoint with Private accessibility — warn that harness may not reach it
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Sequence }
        - SpecCheckpoint: { operation: op_a, symbol: c, accessibility: Private }
    expected:
      outcome: Valid
      warnings:
        - PrivateCheckpoint: { symbol: c }

  - name: ambiguous_construction
    desc: Entry point is a method but no spec_setup — warn about ambiguous construction
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Sequence, symbol: "Request::execute" }
        - SpecCheckpoint: { operation: op_a, symbol: c }
    expected:
      outcome: Valid
      warnings:
        - AmbiguousConstruction: { operation: op_a, type: Request }

  - name: free_function_no_setup_needed
    desc: Entry point is a free function — no construction warning
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless, symbol: validate }
    expected:
      outcome: Valid
      warnings: []

  - name: setup_present_no_warning
    desc: Entry point is a method with a spec_setup — no construction warning
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Sequence, symbol: "Request::execute" }
        - SpecSetup: { operation: op_a, name: default, symbol: "test::setup_request", params: [tenant, token] }
        - SpecCheckpoint: { operation: op_a, symbol: c }
    expected:
      outcome: Valid
      warnings: []

  - name: invalid_still_reports_warnings
    desc: Warnings are reported even when outcome is Invalid
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless, parameter_types: [T1] }
        - SpecSetup: { operation: op_a, name: x, symbol: x }
        - SpecSetup: { operation: op_a, name: x, symbol: y }
      types:
        - { name: T1, is_abstract: true, has_generator: false }
    expected:
      outcome: Invalid
      errors:
        - DuplicateSetupName: { operation: op_a, name: x }
      warnings:
        - AbstractTypeNoGenerator: { operation: op_a }

  - name: duplicate_mock_name_across_operations
    desc: Same mock_name in different operations is valid
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecOperation: { operation: op_b, kind: Stateless }
        - SpecMock: { operation: op_a, symbol: m1, mock_name: svc }
        - SpecMock: { operation: op_b, symbol: m2, mock_name: svc }
    expected:
      outcome: Valid
      warnings: []

  - name: conflicting_params_across_operations
    desc: Same setup param names in different operations is valid
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecOperation: { operation: op_b, kind: Stateless }
        - SpecSetup: { operation: op_a, name: s1, symbol: s1, params: [tenant] }
        - SpecSetup: { operation: op_b, name: s2, symbol: s2, params: [tenant] }
    expected:
      outcome: Valid
      warnings: []

  - name: errormap_with_setup_and_mock
    desc: ErrorMap kind allows setup and mock roles
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: ErrorMap }
        - SpecSetup: { operation: op_a, name: default, symbol: setup }
        - SpecMock: { operation: op_a, symbol: m, mock_name: svc }
    expected:
      outcome: Valid
      warnings: []

  - name: ambiguous_construction_statemachine
    desc: StateMachine method entry point without setup warns too
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: StateMachine, symbol: "Machine::step" }
        - SpecState: { operation: op_a, symbol: s }
    expected:
      outcome: Valid
      warnings:
        - AmbiguousConstruction: { operation: op_a, type: Machine }

  - name: setup_has_self
    desc: Setup with self receiver is a validation error
    inputs:
      annotations:
        - SpecOperation: { operation: op_a, kind: Stateless }
        - SpecSetup: { operation: op_a, name: bad, symbol: "Foo::do_thing", params: [self] }
    expected:
      outcome: Invalid
      errors:
        - InvalidRoleForKind: { operation: op_a, symbol: "Foo::do_thing" }
