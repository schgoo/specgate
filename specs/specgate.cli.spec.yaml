# yaml-language-server: $schema=../spec-schema.json
spec_version: "0.4.0"
name: specgate.cli
binding: ../bindings/rust-cli.yaml

types:
  ValidationFinding:
    severity:
      oneof: [error, warn, info]
    check: string
    file: string
    message: string

  ValidationReport:
    total_files: i32
    errors: i32
    warnings: i32
    findings: List<ValidationFinding>

  RunReport:
    spec_name: string
    total_cases: i32
    passed: i32
    failed: i32
    skipped: i32
    warned: i32

operations:
  validate:
    desc: >
      Static validation of spec files against the schema and semantic
      rules. Catches authoring errors before runtime.
    inputs:
      spec_dir: string
      strict:
        type: bool
        desc: Treat warnings as errors
      spec_only:
        type: bool
        desc: >
          Skip runnability checks that require the implementation source
          (package_root existence and source visibility). Use when authoring
          a spec before its implementation exists.
      assertions_dir:
        type: string
        desc: Directory of assertion source files for coverage checking (opt-in)
    outputs:
      - outcome:
          oneof:
            Pass:
              report: ValidationReport
            Fail:
              report: ValidationReport

  run:
    desc: >
      Run all test cases in a spec through the harness and report results.
    inputs:
      spec: string
    outputs:
      - outcome:
          oneof:
            Complete:
              report: RunReport
            Error:
              reason: string

cases:

  # ================================================================
  # Validate — 1. Schema validation
  # ================================================================

  - name: validate_schema_pass
    desc: Well-formed spec passes schema validation
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/valid_complete
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              errors: 0

  - name: validate_schema_missing_version
    desc: Spec without spec_version fails schema validation
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/missing_version
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: schema
                  message: "missing required field 'spec_version'"

  # ================================================================
  # Validate — 2. Operation reference check
  # ================================================================

  - name: validate_op_ref_pass
    desc: Case referencing existing operation passes
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/valid_complete
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              findings: []

  - name: validate_op_ref_fail
    desc: Case referencing undefined operation fails
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/bad_op_ref
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: operation_reference
                  message: "case 'test_case' references undefined operation 'nonexistent'"

  # ================================================================
  # Validate — 3. Name uniqueness
  # ================================================================

  - name: validate_names_unique_pass
    desc: Unique case names pass
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/valid_complete
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              errors: 0

  - name: validate_names_duplicate_fail
    desc: Duplicate case names fail
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/duplicate_names
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: name_uniqueness
                  message: "duplicate case name 'my_case'"

  # ================================================================
  # Validate — 5. Input completeness
  # ================================================================

  - name: validate_inputs_complete_pass
    desc: Case provides all declared operation inputs
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/valid_complete
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              errors: 0

  - name: validate_inputs_missing_fail
    desc: Case missing a declared input produces error
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/input_mismatch
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: input_completeness
                  message: "case 'missing_input' missing required input 'b' for operation 'add'"

  # ================================================================
  # Validate — 6. Expected format
  # ================================================================

  - name: validate_expected_format_pass
    desc: Well-formed expected entries pass
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/valid_complete
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              errors: 0

  - name: validate_expected_format_fail
    desc: Expected entry with multiple keys fails
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/bad_expected
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: expected_format
                  message: "case 'bad_format' has expected entry with multiple keys"

  # ================================================================
  # Validate — 7. Narrative misuse detection
  # ================================================================

  - name: validate_narrative_proper_pass
    desc: Proper narrative case produces no warning
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/valid_complete
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              warnings: 0

  - name: validate_narrative_misuse_warn
    desc: Narrative with testable-looking verify steps produces warning
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/narrative_misuse
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              warnings: 1
              findings:
                - severity: warn
                  check: narrative_misuse
                  message: "narrative case 'should_be_runnable' has verify steps that look testable"

  # ================================================================
  # Validate — 8. Assertion coverage (requires assertions dir)
  # ================================================================

  - name: validate_coverage_not_applicable
    kind: narrative
    desc: >
      Assertion-aware checks (assertion_coverage, level_correctness,
      negative_coverage, mixed_level_bundle) require a directory of assertion
      source files. When --assertions-dir is omitted it defaults to
      <spec_dir>/sources/assertions; if that directory does not exist these
      checks are skipped. Assertion source files are YAML documents with an
      'id', an RFC 2119 'level' (MUST/SHOULD/MAY), and an optional
      'negatable' flag. assertion_coverage reports any referenced
      assertion_id that is absent from the sources as an error.
    verify:
      - Run with --assertions-dir pointing to a dir of assertion YAML files
      - Referenced assertion_ids missing from the sources are errors
      - When the (default) assertions dir does not exist, the checks are skipped

  # ================================================================
  # Validate — 9. Level matching
  # ================================================================

  - name: validate_level_match_pass
    desc: Source keyword matches case level — no warning
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/valid_complete
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              warnings: 0

  - name: validate_level_mismatch_warn
    desc: Source assertion is MUST but case level is may — produces warning
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/level_mismatch
      strict: false
      assertions_dir: test/fixtures/validation/assertions
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              warnings: 1
              findings:
                - severity: warn
                  check: level_correctness
                  message: "case 'required_but_marked_may' has level 'may' but assertion 'SPEC-REQ-1' is level 'must'"

  # ================================================================
  # Validate — 10. Negative case coverage
  # ================================================================

  - name: validate_negative_coverage_pass
    desc: Negatable assertion with both a positive and a negative case passes
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/negative_coverage_pass
      strict: false
      assertions_dir: test/fixtures/validation/assertions
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              errors: 0

  - name: validate_negative_coverage_warn
    desc: Negatable assertion with only a positive case produces warning
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/no_negative_case
      strict: false
      assertions_dir: test/fixtures/validation/assertions
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              warnings: 1
              findings:
                - severity: warn
                  check: negative_coverage
                  message: "assertion 'SPEC-MUST-1' is negatable but has no negative test case"

  # ================================================================
  # Validate — 11. Assertion coverage
  # ================================================================

  - name: validate_assertion_coverage_pass
    desc: Assertion IDs that exist in assertions dir produce no findings
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/assertion_coverage
      strict: false
      assertions_dir: test/fixtures/validation/assertions
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              errors: 0

  - name: validate_assertion_coverage_miss
    desc: Assertion ID not found in assertions dir produces an error
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/assertion_coverage_miss
      strict: false
      assertions_dir: test/fixtures/validation/assertions
      spec_only: true
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: assertion_coverage
                  message: "assertion 'MISSING-1' referenced in case 'test_case' not found in assertions dir"

  # ================================================================
  # Validate — 5b. Extra inputs
  # ================================================================

  - name: validate_extra_inputs_fail
    desc: Case providing undeclared input produces error
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/extra_inputs
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: input_completeness
                  message: "case 'extra_input' has extra input 'c' not declared in operation 'add'"

  # ================================================================
  # Validate — dep_consistency
  # ================================================================

  - name: validate_dep_consistency_pass
    desc: Operation depends_on referencing a defined operation produces no error
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/dep_consistency_pass
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              errors: 0

  - name: validate_dep_consistency_fail
    desc: Operation depends_on referencing an undefined operation produces error
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/dep_consistency_fail
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: dep_consistency
                  message: "operation 'derived' depends on undefined operation 'missing_op'"

  # ================================================================
  # Validate — mixed_level_bundle
  # ================================================================

  - name: validate_mixed_level_bundle_warn
    desc: Case bundling MUST and MAY level assertions produces warning
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/mixed_level_bundle
      strict: false
      assertions_dir: test/fixtures/validation/assertions
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              warnings: 1
              findings:
                - severity: warn
                  check: mixed_level_bundle
                  message: "case 'mixed_case' bundles assertions of mixed levels (must and may)"

  # ================================================================
  # Validate — 12. Runnable cases must have expected
  # ================================================================

  - name: validate_no_expected_fail
    desc: Runnable case without expected or steps produces error
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/no_expected
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: runnable_expected
                  message: "case 'missing_expected' has no expected or steps"

  # ================================================================
  # Validate — runnability: source visibility (on by default)
  # ================================================================

  - name: validate_source_check_pass
    desc: Source with pub setup functions and pub input fields produces no errors
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/source_check_pass
      strict: false
      assertions_dir: ""
      spec_only: false
    expected:
      - $result:
          Pass:
            report:
              errors: 0

  - name: validate_source_check_setup_not_pub
    desc: A #[spec_setup] function that is not pub produces an error
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/source_check_fail_setup
      strict: false
      assertions_dir: ""
      spec_only: false
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: source_setup_visibility
                  message: "#[spec_setup] function 'make_request' must be declared 'pub fn'"

  - name: validate_source_check_field_not_pub
    desc: A constructible input-type field that is not pub produces an error
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/source_check_fail_field
      strict: false
      assertions_dir: ""
      spec_only: false
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: source_field_visibility
                  message: "field 'x' of input type 'ComputeRequest' must be 'pub'"

  - name: validate_spec_only_skips_source_checks
    desc: spec_only suppresses source-dependent runnability checks
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/source_check_fail_setup
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              errors: 0

  # ================================================================
  # Validate — runnability: structural (on by default)
  # ================================================================

  - name: validate_no_cases_fail
    desc: A spec with no test cases cannot be harnessed
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/no_cases
      strict: false
      assertions_dir: ""
      spec_only: false
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: no_cases
                  message: "spec has no test cases"

  - name: validate_no_binding_fail
    desc: A spec without a binding cannot be harnessed
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/no_binding
      strict: false
      assertions_dir: ""
      spec_only: false
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: binding_present
                  message: "spec has no binding"

  - name: validate_binding_not_found_fail
    desc: A binding path that does not resolve cannot be harnessed
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/bad_binding_path
      strict: false
      assertions_dir: ""
      spec_only: false
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: binding_resolves
                  message: "binding 'does_not_exist.yaml' not found"

  - name: validate_target_not_found_fail
    desc: A referenced target absent from the binding cannot be harnessed
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/bad_target
      strict: false
      assertions_dir: ""
      spec_only: false
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: target_exists
                  message: "target 'ghost' not found in binding"

  - name: validate_package_root_missing_fail
    desc: A target whose package_root does not exist cannot be harnessed
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/bad_package_root
      strict: false
      assertions_dir: ""
      spec_only: false
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: package_root_exists
                  message: "package_root '../nonexistent' does not exist"

  - name: validate_package_root_missing_skipped_when_spec_only
    desc: spec_only suppresses package_root existence checking
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/bad_package_root
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              errors: 0

  # ================================================================
  # Validate — runnability: source annotation + wiring (on by default)
  # ================================================================

  - name: validate_operation_not_annotated_fail
    desc: A cased operation with no #[spec_operation] in source cannot be run
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/op_not_annotated
      strict: false
      assertions_dir: ""
      spec_only: false
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: operation_annotated
                  message: "case 'compute_case' uses operation 'compute' with no #[spec_operation] in the source"

  - name: validate_operation_not_annotated_skipped_when_spec_only
    desc: spec_only suppresses operation-annotation checking
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/op_not_annotated
      strict: false
      assertions_dir: ""
      spec_only: true
    expected:
      - $result:
          Pass:
            report:
              errors: 0

  - name: validate_setup_not_wired_fail
    desc: A method op whose receiver has no setup cannot wire
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/setup_not_wired
      strict: false
      assertions_dir: ""
      spec_only: false
    expected:
      - $result:
          Fail:
            report:
              errors: 1
              findings:
                - severity: error
                  check: setup_wiring
                  message: "case 'increment_case': operation 'increment' is a method on 'Counter' but no #[spec_setup(\"increment\")] returns 'Counter' to construct the receiver"

  # ================================================================
  # Validate — full runnability pass (every check at once)
  # ================================================================

  - name: validate_full_runnable_pass
    desc: >
      A complete, genuinely-runnable spec passes every check at once in full
      mode (no spec_only): schema and semantic checks, binding/target/
      package_root resolution, operation annotation, setup wiring, and both
      source-visibility checks.
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/full_runnable
      strict: false
      assertions_dir: ""
      spec_only: false
    expected:
      - $result:
          Pass:
            report:
              errors: 0
              warnings: 0

  # ================================================================
  # CLI binary — end-to-end command-target smoke tests
  # ================================================================
  # These run the actual `specgate` binary (via cargo run), so they cover the
  # binary entry point — name, argument parsing, and exit codes — that the
  # function-level validate/run cases bypass by calling the functions directly.

  - name: cli_binary_validates_clean_spec
    target: smoke_validate_pass
    desc: >
      The specgate binary builds, parses args, validates a complete spec, and
      exits 0 (mapped to Complete).
    expected:
      - $outcome: "Complete"

  - name: cli_binary_rejects_invalid_spec
    target: smoke_validate_fail
    desc: >
      The specgate binary exits non-zero when validation fails (mapped to
      Error), proving the Fail -> non-zero exit-code mapping in main.rs.
    expected:
      - $outcome: "Error"

  - name: cli_binary_runs_passing_spec
    target: smoke_run_pass
    desc: >
      The specgate binary's `run` subcommand executes a passing spec through
      the harness and exits 0 (mapped to Complete).
    expected:
      - $outcome: "Complete"

  - name: cli_binary_run_reports_error
    target: smoke_run_fail
    desc: >
      The specgate binary's `run` subcommand exits non-zero for a missing spec
      file (mapped to Error), covering run's error exit path.
    expected:
      - $outcome: "Error"

  - name: cli_binary_run_coverage
    target: smoke_run_coverage
    desc: >
      The specgate binary's `run --coverage` measures coverage of the
      implementation crate under test and exits 0 (mapped to Complete). Exits 0
      whether coverage is measured or unavailable; the threshold exit-code logic
      is covered by unit tests.
    expected:
      - $outcome: "Complete"

  # ================================================================
  # Run — all status types
  # ================================================================

  - name: run_all_pass
    desc: Running a passing spec reports all passed
    operation: run
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/stateless_add.spec.yaml
    expected:
      - $result:
          Complete:
            report:
              spec_name: fixture.stateless_add
              total_cases: 1
              passed: 1
              failed: 0
              skipped: 0
              warned: 0

  - name: run_with_failure
    desc: Running a failing spec reports failure count
    operation: run
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/statemachine_counter_wrong.spec.yaml
    expected:
      - $result:
          Complete:
            report:
              spec_name: fixture.statemachine_counter_wrong
              total_cases: 1
              passed: 0
              failed: 1
              skipped: 0
              warned: 0

  - name: run_with_skip
    desc: Running a spec with level may + missing annotation reports skip
    operation: run
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/level_may_missing.spec.yaml
    expected:
      - $result:
          Complete:
            report:
              total_cases: 1
              passed: 0
              failed: 0
              skipped: 1
              warned: 0

  - name: run_with_warn
    desc: Running a spec with level should + missing annotation reports warn
    operation: run
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/level_should_missing.spec.yaml
    expected:
      - $result:
          Complete:
            report:
              total_cases: 1
              passed: 0
              failed: 0
              skipped: 0
              warned: 1

  - name: run_nonexistent_spec
    desc: Running a spec that doesn't exist produces error
    operation: run
    inputs:
      spec: does/not/exist.spec.yaml
    expected:
      - $result:
          Error:
            reason: "spec file not found: does/not/exist.spec.yaml"

  - name: run_invalid_yaml
    desc: Running a spec with bad YAML produces error
    operation: run
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/bad_yaml.spec.yaml
    expected:
      - $result:
          Error:
            reason: "spec file is not valid YAML"

  # ================================================================
  # Narrative
  # ================================================================

  - name: cli_exit_codes
    kind: narrative
    desc: >
      Exit code 0 when all checks pass (validate) or all cases pass (run).
      Exit code 1 when any error/failure is found.
      Exit code 2 for usage errors (bad arguments).
    verify:
      - Run specgate validate on valid specs — exit 0
      - Run specgate validate on invalid specs — exit 1
      - Run specgate with no args — exit 2

  - name: terminal_output_format
    kind: narrative
    desc: >
      Default terminal output uses colored pass/fail indicators,
      a summary line, and gap warnings. Readable at a glance.
    verify:
      - Run specgate run on a fixture spec
      - Output shows colored pass/fail per case
      - Summary line at end shows counts
