# yaml-language-server: $schema=../spec-schema.json
spec_version: "0.4.0"
name: specgate.cli
binding: ../bindings/rust.yaml

types:
  ValidationFinding:
    severity:
      oneof: [error, warn, info]
    check: string
    file: string
    message: string

  ValidationReport:
    total_files: i32
    errors: i32
    warnings: i32
    findings: List<ValidationFinding>

  RunReport:
    spec_name: string
    total_cases: i32
    passed: i32
    failed: i32
    skipped: i32
    warned: i32
    cases: List<CaseResult>

operations:
  validate:
    desc: >
      Static validation of spec files against the schema and semantic
      rules. Catches authoring errors before runtime.
    inputs:
      spec_dir: string
      strict:
        type: bool
        desc: Treat warnings as errors
      suppress:
        type: List<string>
        desc: Check names to suppress
    outputs:
      - outcome:
          oneof:
            Pass:
              report: ValidationReport
            Fail:
              report: ValidationReport

  run:
    desc: >
      Run all test cases in a spec through the harness and report results.
    inputs:
      spec: string
    outputs:
      - outcome:
          oneof:
            Complete:
              report: RunReport
            Error:
              reason: string

cases:

  # ================================================================
  # Validate — schema checks
  # ================================================================

  - name: validate_valid_spec
    desc: A well-formed spec produces no errors
    operation: validate
    inputs:
      spec_dir: test/rust/crates/specgate-fixtures/specs
      strict: false
      suppress: []
    expected:
      outcome:
        Pass:
          report:
            errors: 0

  - name: validate_missing_spec_version
    desc: Spec without spec_version produces schema error
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/missing_version
      strict: false
      suppress: []
    expected:
      outcome:
        Fail:
          report:
            errors: 1
            findings:
              - severity: error
                check: schema
                message: "missing required field 'spec_version'"

  # ================================================================
  # Validate — operation reference checks
  # ================================================================

  - name: validate_case_references_missing_operation
    desc: Case references an operation not in the operations block
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/bad_op_ref
      strict: false
      suppress: []
    expected:
      outcome:
        Fail:
          report:
            errors: 1
            findings:
              - severity: error
                check: operation_reference
                message: "case 'test_case' references undefined operation 'nonexistent'"

  # ================================================================
  # Validate — name uniqueness
  # ================================================================

  - name: validate_duplicate_case_names
    desc: Two cases with the same name produces an error
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/duplicate_names
      strict: false
      suppress: []
    expected:
      outcome:
        Fail:
          report:
            errors: 1
            findings:
              - severity: error
                check: name_uniqueness
                message: "duplicate case name 'my_case'"

  # ================================================================
  # Validate — provenance
  # ================================================================

  - name: validate_missing_provenance
    desc: Runnable case without source.assertion_ids produces warning
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/no_provenance
      strict: false
      suppress: []
    expected:
      outcome:
        Pass:
          report:
            warnings: 1
            findings:
              - severity: warn
                check: provenance
                message: "case 'my_case' has no source.assertion_ids"

  - name: validate_missing_provenance_strict
    desc: In strict mode, provenance warning becomes error
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/no_provenance
      strict: true
      suppress: []
    expected:
      outcome:
        Fail:
          report:
            errors: 1

  # ================================================================
  # Validate — suppress
  # ================================================================

  - name: validate_suppress_check
    desc: Suppressed check produces no findings
    operation: validate
    inputs:
      spec_dir: test/fixtures/validation/no_provenance
      strict: false
      suppress: [provenance]
    expected:
      outcome:
        Pass:
          report:
            warnings: 0

  # ================================================================
  # Run — basic
  # ================================================================

  - name: run_passing_spec
    desc: Running a passing spec produces a complete report
    operation: run
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/stateless_add.spec.yaml
    expected:
      outcome:
        Complete:
          report:
            spec_name: fixture.stateless_add
            total_cases: 1
            passed: 1
            failed: 0
            skipped: 0
            warned: 0

  - name: run_failing_spec
    desc: Running a failing spec reports failures
    operation: run
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/statemachine_counter_wrong.spec.yaml
    expected:
      outcome:
        Complete:
          report:
            spec_name: fixture.statemachine_counter_wrong
            total_cases: 1
            passed: 0
            failed: 1

  - name: run_nonexistent_spec
    desc: Running a spec that doesn't exist produces error
    operation: run
    inputs:
      spec: does/not/exist.spec.yaml
    expected:
      outcome:
        Error:
          reason: "spec file not found: does/not/exist.spec.yaml"

  # ================================================================
  # Narrative
  # ================================================================

  - name: cli_exit_codes
    kind: narrative
    desc: >
      Exit code 0 when all checks pass (validate) or all cases pass (run).
      Exit code 1 when any error/failure is found.
      Exit code 2 for usage errors (bad arguments).
    verify:
      - Run specgate validate on valid specs — exit 0
      - Run specgate validate on invalid specs — exit 1
      - Run specgate with no args — exit 2
