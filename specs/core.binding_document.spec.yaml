# yaml-language-server: $schema=../spec-schema.json
# SpecGate component: core.binding_document
#
# Defines the shape of a valid binding YAML file. Binding files connect
# a spec to a language-specific package by declaring a language and one
# or more named targets.
#
# The Rust BindingFile struct (rust/crates/specgate-types/src/binding_file.rs)
# and the JSON Schema (binding-schema.json) must be consistent with the
# type definitions in this file.
#
# All paths in a binding file are relative to the binding file's own
# location.

name: core.binding_document
binding: ../bindings/rust.yaml

types:

  # === Top-level document ===

  BindingFile:
    language: string                         # required — "rust" or "csharp"
    targets: Map<string, BindingTarget>      # optional — named execution targets

  # === Target definition ===

  BindingTarget:
    package_root: string                     # required — relative path to crate/project root
    test_root: string                        # optional — where to write generated tests
    build: string                            # optional — build command
    command: string                          # optional — shell command (mutually exclusive with `function`)
    function: string                         # optional — fully qualified function name (mutually exclusive with `command`)
    constructor: string                      # optional — fully qualified constructor for API targets
    outputs: BindingTargetOutputs            # optional

  BindingTargetOutputs:
    file: string                             # optional — path to output file (supports {workdir})
    stdout: string                           # optional — stdout format, e.g. "json"

cases:

  # === Valid bindings ===

  - name: minimal_default_target
    desc: The minimal binding form used by every fixture — language + one default target with package_root
    operation: validate
    inputs:
      yaml: |
        language: rust
        targets:
          default:
            package_root: ..
    expected:
      - validate.outcome: "Valid"

  - name: valid_command_target
    desc: A target may declare a shell command and an output format
    operation: validate
    inputs:
      yaml: |
        language: rust
        targets:
          run-cli:
            package_root: ../my-cli
            command: cargo run -q -p my-cli -- {spec_path}
            outputs:
              stdout: json
    expected:
      - validate.outcome: "Valid"

  - name: valid_api_target
    desc: A target may declare a function for in-process API calls
    operation: validate
    inputs:
      yaml: |
        language: rust
        targets:
          validate-spec:
            package_root: ../my-crate
            function: my_crate::validate
    expected:
      - validate.outcome: "Valid"

  - name: multiple_targets
    desc: A binding may declare multiple named targets
    operation: validate
    inputs:
      yaml: |
        language: rust
        targets:
          test:
            package_root: ../my-crate
            command: cargo test -p my-crate
          build-only:
            package_root: ../my-crate
            build: cargo build -p my-crate
    expected:
      - validate.outcome: "Valid"

  - name: empty_targets_is_valid
    desc: A binding with no targets is still valid (targets is optional)
    operation: validate
    inputs:
      yaml: |
        language: csharp
    expected:
      - validate.outcome: "Valid"

  - name: build_only_target
    desc: A target may declare only a build command (no command or function)
    operation: validate
    inputs:
      yaml: |
        language: rust
        targets:
          compile-check:
            package_root: ../my-crate
            build: cargo build -q
    expected:
      - validate.outcome: "Valid"

  - name: file_based_output
    desc: A target may declare a file output with template variables
    operation: validate
    inputs:
      yaml: |
        language: rust
        targets:
          test:
            package_root: ../my-crate
            command: cargo test -p my-crate
            outputs:
              file: "{workdir}/results.json"
    expected:
      - validate.outcome: "Valid"

  # === Invalid bindings ===

  - name: reject_missing_language
    desc: language is a required top-level field
    operation: validate
    inputs:
      yaml: |
        targets:
          default:
            package_root: ..
    expected:
      - validate.outcome: "Invalid"
      - validate.error: "missing required field: language"

  - name: reject_unknown_language
    desc: language must be one of the supported backends (rust, csharp)
    operation: validate
    inputs:
      yaml: |
        language: cobol
        targets:
          default:
            package_root: ..
    expected:
      - validate.outcome: "Invalid"

  - name: reject_target_missing_package_root
    desc: Every target must declare package_root
    operation: validate
    inputs:
      yaml: |
        language: rust
        targets:
          test:
            command: cargo test
    expected:
      - validate.outcome: "Invalid"
      - validate.error: "missing required field: package_root"

  - name: reject_target_with_both_command_and_function
    desc: A target cannot declare both command and function — they are mutually exclusive
    operation: validate
    inputs:
      yaml: |
        language: rust
        targets:
          ambiguous:
            package_root: ../my-crate
            command: cargo test
            function: my_crate::run
    expected:
      - validate.outcome: "Invalid"
      - validate.error: "target cannot have both command and function"
