# yaml-language-server: $schema=../spec-schema.json
# SpecGate component: rust.extract
#
# Given Rust source code annotated with #[sg_*] attributes,
# build the crate and collect the annotations the macros registered.
# This is the Rust parallel of csharp.extract. The macro library
# (rust.annotations) is tested implicitly — if macros produce wrong
# metadata, these cases fail.
#
# Entry point: cargo build (macros fire at compile time, output to
# target/specgate.json). Test fixtures are .rs files that use the
# sg_* attributes.
#
# See bindings/rust.yaml for build command and output path.

name: rust.extract
kind: Build

inputs:
  fixture:
    type: RustSource
    source: fixture-file
    desc: Rust source file containing sg_* attribute macros, compiled as a crate

types:
  Annotation:
    oneof:
      SpecOperation: { operation: string, kind: string, symbol: string }
      SpecInput: { operation: string, symbol: string, params: "List<string>" }
      SpecCheckpoint: { operation: string, symbol: string }
      SpecState: { operation: string, symbol: string }
      SpecEnvironment: { operation: string, symbol: string }
      SpecDependency: { operation: string, symbol: string, dependency_name: string }

  ExtractionError:
    oneof:
      ParseError: { message: string }
      UnrecognizedAttribute: { symbol: string, attribute: string }
      MissingRequiredField: { symbol: string, field: string }
      InvalidKind: { symbol: string, kind: string }

outcome: "oneof [Ok, Error]"

outputs:
  when Ok:
    annotations:
      type: "List<Annotation>"
      source: build-artifact
  when Error:
    errors:
      type: "List<ExtractionError>"
      source: compiler-output

# -------------------------------------------------------------------
# Cases
# -------------------------------------------------------------------
cases:

  # ===== OK: single annotation =====

  - name: pure_entry_point
    desc: Extracts a Pure operation from a bare sg_entry_point attribute
    inputs:
      fixture: |
        #[sg_entry_point("op_a", kind = "Pure")]
        fn handler() {}
    expected:
      outcome: Ok
      annotations:
        - SpecOperation: { operation: op_a, kind: Pure, symbol: handler }

  - name: sequence_entry_point
    desc: Extracts a Sequence operation kind
    inputs:
      fixture: |
        #[sg_entry_point("op_a", kind = "Sequence")]
        async fn process() {}
    expected:
      outcome: Ok
      annotations:
        - SpecOperation: { operation: op_a, kind: Sequence, symbol: process }

  - name: input_on_constructor
    desc: Extracts an Input role from an impl fn (Rust constructor pattern)
    inputs:
      fixture: |
        impl Request {
            #[sg_input("op_a")]
            fn new(tenant: String, token: String) -> Self { todo!() }
        }
    expected:
      outcome: Ok
      annotations:
        - SpecInput: { operation: op_a, symbol: "Request::new", params: [tenant, token] }

  - name: input_on_method
    desc: Extracts an Input role from a setter method
    inputs:
      fixture: |
        impl Request {
            #[sg_input("op_a")]
            fn set_endpoint(&mut self, ep: String) { todo!() }
        }
    expected:
      outcome: Ok
      annotations:
        - SpecInput: { operation: op_a, symbol: "Request::set_endpoint", params: [ep] }

  - name: checkpoint_annotation
    desc: Extracts a Checkpoint role
    inputs:
      fixture: |
        impl Handler {
            #[sg_checkpoint("op_a")]
            fn get_routing_hint(&self) -> String { todo!() }
        }
    expected:
      outcome: Ok
      annotations:
        - SpecCheckpoint: { operation: op_a, symbol: "Handler::get_routing_hint" }

  - name: state_annotation
    desc: Extracts a State role from a field-level attribute
    inputs:
      fixture: |
        struct Machine {
            #[sg_state("op_a")]
            current: Status,
        }
    expected:
      outcome: Ok
      annotations:
        - SpecState: { operation: op_a, symbol: "Machine::current" }

  - name: environment_annotation
    desc: Extracts an Environment role
    inputs:
      fixture: |
        impl Handler {
            #[sg_environment("op_a")]
            fn runtime_model(&self) -> RuntimeModel { todo!() }
        }
    expected:
      outcome: Ok
      annotations:
        - SpecEnvironment: { operation: op_a, symbol: "Handler::runtime_model" }

  - name: dependency_annotation
    desc: Extracts a Dependency role with a named dependency
    inputs:
      fixture: |
        impl Handler {
            #[sg_dependency("op_a", name = "rest_client")]
            fn call_api(&self) -> Response { todo!() }
        }
    expected:
      outcome: Ok
      annotations:
        - SpecDependency: { operation: op_a, symbol: "Handler::call_api", dependency_name: rest_client }

  # ===== OK: multi-annotation =====

  - name: full_sequence_operation
    desc: Extracts all annotation roles for a complete Sequence operation
    inputs:
      fixture: |
        struct Request {
            #[sg_state("find_user")]
            retries: u32,
        }

        impl Request {
            #[sg_input("find_user")]
            fn new(tenant: String, token: String) -> Self { todo!() }

            #[sg_input("find_user")]
            fn set_endpoint(&mut self, ep: String) { todo!() }

            #[sg_environment("find_user")]
            fn runtime_model(&self) -> RuntimeModel { todo!() }

            #[sg_entry_point("find_user", kind = "Sequence")]
            async fn execute(&self) -> User { todo!() }

            #[sg_checkpoint("find_user")]
            fn get_routing_hint(&self) -> String { todo!() }

            #[sg_dependency("find_user", name = "http")]
            fn call_api(&self) -> Response { todo!() }
        }
    expected:
      outcome: Ok
      annotations:
        - SpecState: { operation: find_user, symbol: "Request::retries" }
        - SpecInput: { operation: find_user, symbol: "Request::new", params: [tenant, token] }
        - SpecInput: { operation: find_user, symbol: "Request::set_endpoint", params: [ep] }
        - SpecEnvironment: { operation: find_user, symbol: "Request::runtime_model" }
        - SpecOperation: { operation: find_user, kind: Sequence, symbol: "Request::execute" }
        - SpecCheckpoint: { operation: find_user, symbol: "Request::get_routing_hint" }
        - SpecDependency: { operation: find_user, symbol: "Request::call_api", dependency_name: http }

  - name: two_independent_operations
    desc: Extracts annotations from two unrelated operations in the same file
    inputs:
      fixture: |
        #[sg_entry_point("op_a", kind = "Pure")]
        fn handle_a() {}

        #[sg_entry_point("op_b", kind = "Pure")]
        fn handle_b() {}
    expected:
      outcome: Ok
      annotations:
        - SpecOperation: { operation: op_a, kind: Pure, symbol: handle_a }
        - SpecOperation: { operation: op_b, kind: Pure, symbol: handle_b }

  - name: no_annotations
    desc: Source with no sg_* attributes produces an empty list
    inputs:
      fixture: |
        fn plain_function() {}
        struct PlainStruct { x: i32 }
    expected:
      outcome: Ok
      annotations: []

  # ===== OK: edge cases =====

  - name: self_param_excluded
    desc: The self parameter is not included in extracted Input params
    inputs:
      fixture: |
        impl Foo {
            #[sg_input("op_a")]
            fn set_value(&mut self, val: i32) { todo!() }
        }
    expected:
      outcome: Ok
      annotations:
        - SpecInput: { operation: op_a, symbol: "Foo::set_value", params: [val] }

  - name: non_sg_attributes_ignored
    desc: Other proc-macro attributes do not interfere with extraction
    inputs:
      fixture: |
        #[derive(Debug, Clone)]
        #[serde(rename_all = "camelCase")]
        struct Request {
            #[sg_state("op_a")]
            status: Status,
        }
    expected:
      outcome: Ok
      annotations:
        - SpecState: { operation: op_a, symbol: "Request::status" }

  # ===== ERROR =====

  - name: invalid_kind_value
    desc: An unrecognized kind string produces an error
    inputs:
      fixture: |
        #[sg_entry_point("op_a", kind = "Stream")]
        fn handler() {}
    expected:
      outcome: Error
      errors:
        - InvalidKind: { symbol: handler, kind: Stream }

  - name: missing_operation_name
    desc: An sg_* attribute without an operation name produces an error
    inputs:
      fixture: |
        #[sg_entry_point(kind = "Pure")]
        fn handler() {}
    expected:
      outcome: Error
      errors:
        - MissingRequiredField: { symbol: handler, field: operation }

  - name: unrecognized_sg_attribute
    desc: An attribute starting with sg_ but not in the known set is rejected
    inputs:
      fixture: |
        #[sg_unknown("op_a")]
        fn handler() {}
    expected:
      outcome: Error
      errors:
        - UnrecognizedAttribute: { symbol: handler, attribute: sg_unknown }

  - name: parse_error
    desc: Malformed Rust source produces a parse error
    inputs:
      fixture: |
        fn broken( { }
    expected:
      outcome: Error
      errors:
        - ParseError: { message: "expected closing parenthesis" }
