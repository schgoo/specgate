  # ===== Runtime: multiple calls accumulate =====

  - name: runtime_multiple_calls
    desc: Calling the same operation twice produces two complete spans
    binding:
      name: rust
      target: run-annotations
    inputs:
      source: |
        #[derive(SpecCapture)]
        pub struct Counter {
            #[spec_capture("counting")]
            pub count: u32,
        }

        impl Counter {
            pub fn new() -> Self { Counter { count: 0 } }

            #[spec_operation("counting", kind = StateMachine)]
            pub fn increment(&mut self) {
