  # ===== Runtime: capture + checkpoint combined =====

  - name: runtime_capture_and_checkpoint
    desc: Operation with both boundary captures and an explicit inline checkpoint
    binding:
      name: rust
      target: run-annotations
    inputs:
      source: |
        #[derive(SpecCapture)]
        pub struct Accumulator {
            #[spec_capture("accumulate")]
            pub total: i64,
        }

        impl Accumulator {
            pub fn new() -> Self { Accumulator { total: 0 } }

            #[spec_operation("accumulate", kind = StateMachine)]
            pub fn add_doubled(&mut self, x: i64) {
                let doubled = spec_checkpoint!("accumulate", x * 2);
                self.total += doubled;
            }
        }

        #[spec_setup("accumulate", name = "default")]
        pub fn make_acc() -> Accumulator { Accumulator::new() }
      driver: |
        let mut acc = make_acc();
        acc.add_doubled(5);
    expected:
      outcome: Ok
      traces:
        - OperationEnter: { operation: accumulate, symbol: "fixture::Accumulator::add_doubled" }
        - CaptureBefore: { operation: accumulate, field: total, value: "0" }
        - Checkpoint: { operation: accumulate, symbol: "fixture::Accumulator::add_doubled::checkpoint_1", value: "10" }
        - CaptureAfter: { operation: accumulate, field: total, value: "10" }
        - OperationExit: { operation: accumulate, symbol: "fixture::Accumulator::add_doubled" }

  # ===== Runtime: field-level capture =====

  - name: runtime_field_level_capture
    desc: Field-level spec_capture selectively captures only annotated fields
    binding:
      name: rust
      target: run-annotations
    inputs:
      source: |
        #[derive(SpecCapture)]
        pub struct Pair {
            #[spec_capture("swap")]
            pub left: i32,
            pub right: i32,
        }

        impl Pair {
            pub fn new(l: i32, r: i32) -> Self { Pair { left: l, right: r } }

            #[spec_operation("swap", kind = StateMachine)]
            pub fn swap(&mut self) {
                std::mem::swap(&mut self.left, &mut self.right);
            }
        }

        #[spec_setup("swap", name = "default")]
        pub fn make_pair() -> Pair { Pair::new(1, 2) }
      driver: |
        let mut p = make_pair();
        p.swap();
    expected:
      outcome: Ok
      traces:
        - OperationEnter: { operation: swap, symbol: "fixture::Pair::swap" }
        - CaptureBefore: { operation: swap, field: left, value: "1" }
        - CaptureAfter: { operation: swap, field: left, value: "2" }
        - OperationExit: { operation: swap, symbol: "fixture::Pair::swap" }
