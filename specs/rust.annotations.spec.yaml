        - CaptureAfter: { operation: counting, field: count, value: "1" }
        - OperationExit: { operation: counting, symbol: "fixture::Counter::increment" }

  # ===== Runtime: checkpoint traces =====

  - name: runtime_checkpoint_attribute
    desc: Checkpoint attribute records the method return value each time it's called
    binding:
      name: rust
      target: run-annotations
    inputs:
      source: |
        pub struct Pipeline;

        impl Pipeline {
            pub fn new() -> Self { Pipeline }

            #[spec_checkpoint("process")]
            pub fn validate(&self, input: &str) -> bool {
                !input.is_empty()
            }

            #[spec_operation("process", kind = Sequence)]
            pub fn run(&self, input: &str) -> String {
                let valid = self.validate(input);
                if valid { input.to_uppercase() } else { String::new() }
            }
        }

        #[spec_setup("process", name = "default")]
        pub fn make_pipeline() -> Pipeline { Pipeline::new() }
      driver: |
        let p = make_pipeline();
        let _result = p.run("hello");
    expected:
      outcome: Ok
      traces:
        - OperationEnter: { operation: process, symbol: "fixture::Pipeline::run" }
        - Checkpoint: { operation: process, symbol: "fixture::Pipeline::validate", value: "true" }
        - OperationExit: { operation: process, symbol: "fixture::Pipeline::run" }

  - name: runtime_checkpoint_inline
    desc: Inline spec_checkpoint! records the expression value and passes it through
    binding:
      name: rust
      target: run-annotations
    inputs:
      source: |
        pub fn double(x: i32) -> i32 { x * 2 }

        #[spec_operation("calc", kind = Sequence)]
        pub fn compute(x: i32) -> i32 {
            let doubled = spec_checkpoint!("calc", double(x));
            doubled + 1
        }
      driver: |
        let result = compute(5);
        assert_eq!(result, 11);
    expected:
      outcome: Ok
      traces:
        - OperationEnter: { operation: calc, symbol: "fixture::compute" }
        - Checkpoint: { operation: calc, symbol: "fixture::compute::checkpoint_1", value: "10" }
        - OperationExit: { operation: calc, symbol: "fixture::compute" }

  # ===== Runtime: mock traces =====

  - name: runtime_mock_injection
    desc: Mock annotation allows injecting a return value in tests
    binding:
      name: rust
      target: run-annotations
    inputs:
      source: |
        pub struct Service;

        impl Service {
            pub fn new() -> Self { Service }

            #[spec_mock("fetch", name = "backend")]
            pub fn call_api(&self) -> String {
                "real_response".to_string()
            }

            #[spec_operation("fetch", kind = Stateless)]
            pub fn fetch(&self) -> String {
                self.call_api()
            }
        }

        #[spec_setup("fetch", name = "default")]
        pub fn make_service() -> Service { Service::new() }
      driver: |
        specgate::runtime::install_mock("backend", "injected_response");
        let svc = make_service();
        let result = svc.fetch();
        assert_eq!(result, "injected_response");
    expected:
      outcome: Ok
      traces:
        - OperationEnter: { operation: fetch, symbol: "fixture::Service::fetch" }
        - MockCall: { operation: fetch, mock_name: backend, returned: "injected_response" }
        - OperationExit: { operation: fetch, symbol: "fixture::Service::fetch" }

  # ===== Runtime: nested operations =====

  - name: runtime_nested_operations
    desc: Nested operation calls produce correctly bracketed trace spans
    binding:
      name: rust
      target: run-annotations
    inputs:
      source: |
        #[derive(SpecCapture)]
        pub struct Account {
            #[spec_capture("banking")]
            pub balance: i64,
        }

        impl Account {
            pub fn new(balance: i64) -> Self { Account { balance } }

            #[spec_operation("banking", kind = StateMachine)]
            pub fn withdraw(&mut self, amount: i64) {
                self.balance -= amount;
            }

            #[spec_operation("banking", kind = StateMachine)]
            pub fn deposit(&mut self, amount: i64) {
                self.balance += amount;
            }

            #[spec_operation("banking", kind = Sequence)]
            pub fn transfer(&mut self, to: &mut Account, amount: i64) {
                self.withdraw(amount);
                to.deposit(amount);
            }
        }
      driver: |
        let mut alice = Account::new(1000);
        let mut bob = Account::new(500);
        alice.transfer(&mut bob, 200);
    expected:
      outcome: Ok
      traces:
        - OperationEnter: { operation: banking, symbol: "fixture::Account::transfer" }
        - OperationEnter: { operation: banking, symbol: "fixture::Account::withdraw" }
        - CaptureBefore: { operation: banking, field: balance, value: "1000" }
        - CaptureAfter: { operation: banking, field: balance, value: "800" }
        - OperationExit: { operation: banking, symbol: "fixture::Account::withdraw" }
        - OperationEnter: { operation: banking, symbol: "fixture::Account::deposit" }
        - CaptureBefore: { operation: banking, field: balance, value: "500" }
        - CaptureAfter: { operation: banking, field: balance, value: "700" }
        - OperationExit: { operation: banking, symbol: "fixture::Account::deposit" }
        - OperationExit: { operation: banking, symbol: "fixture::Account::transfer" }

