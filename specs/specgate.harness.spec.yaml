                - Event: { name: shape.radius, value: "5" }
            - name: multi_field_variant
              status: pass
              expected:
                - shape: "Rectangle"
                - shape.width: "3"
                - shape.height: "4"
              traces:
                - Run: { operation: classify }
                - Event: { name: classify.sides, value: "4" }
                - Event: { name: shape, value: "Rectangle" }
                - Event: { name: shape.width, value: "3" }
                - Event: { name: shape.height, value: "4" }

  # ================================================================
