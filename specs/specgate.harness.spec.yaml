  # ================================================================
  # Property tests — counterexamples (should fail with shrunk values)
  # ================================================================

  - name: property_counterexamples
    desc: >
      Each case has a broken assertion so proptest finds a counterexample.
      We assert status: fail and counterexample contains the generator keys.
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/property_counterexamples.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: counter_i32
              status: fail
              kind: property
              counterexample:
                x: { $exists: true }
              traces:
                - Run: { operation: identity_i32 }
                - Event: { name: $result, value: { $exists: true } }
            - name: counter_f64
              status: fail
              kind: property
              counterexample:
                x: { $exists: true }
              traces:
                - Run: { operation: identity_f64 }
                - Event: { name: $result, value: { $exists: true } }
            - name: counter_bool
              status: fail
              kind: property
              counterexample:
                x: { $exists: true }
              traces:
                - Run: { operation: identity_bool }
                - Event: { name: $result, value: { $exists: true } }
            - name: counter_string
              status: fail
              kind: property
              counterexample:
                s: { $exists: true }
              traces:
                - Run: { operation: identity_string }
                - Event: { name: $result, value: { $exists: true } }
            - name: counter_oneof
              status: fail
              kind: property
              counterexample:
                choice: { $exists: true }
              traces:
                - Run: { operation: identity_string }
                - Event: { name: $result, value: { $exists: true } }
            - name: counter_list
              status: fail
              kind: property
              counterexample:
                items: { $exists: true }
              traces:
                - Run: { operation: sum_list }
                - Event: { name: $result, value: { $exists: true } }
            - name: counter_set
              status: fail
              kind: property
              counterexample:
                items: { $exists: true }
              traces:
                - Run: { operation: set_size }
                - Event: { name: $result, value: { $exists: true } }
            - name: counter_map
              status: fail
              kind: property
              counterexample:
                data: { $exists: true }
              traces:
                - Run: { operation: map_keys }
                - Event: { name: $result, value: { $exists: true } }

  # ================================================================
