              status: pass
            - name: sum_three_points
              status: pass
            - name: nested_config_object
              status: pass
            - name: area_of_circle
              status: pass
            - name: area_of_rectangle
              status: pass
            - name: area_of_point
              status: pass
            - name: classify_circle
              status: pass
            - name: classify_rectangle
              status: pass
            - name: classify_point
              status: pass
