  # ================================================================
  # Enum SpecEvent support (#19)
  # ================================================================

  - name: enum_event_matching
    desc: derive(SpecEvent) on enum emits variant name + associated fields
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/enum_event.spec.yaml
    expected:
      outcome:
        Complete:
