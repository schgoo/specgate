      operation's parameter type derives SpecEvent (which implies
      Deserialize), the harness deserializes the YAML directly into
      the typed parameter. Operations transform the input to prove
      deserialization worked. Covers: struct, enum, list, map,
      optional, and nested struct — both input and output directions.
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/complex_inputs.spec.yaml
    expected:
