                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }

  # ================================================================
  # Matching directives — $unordered, $anywhere, $run collision
  # ================================================================

  - name: unordered_field_matching
    desc: $unordered block matches fields in any order between ordered items
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/unordered_fields.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: unordered_both_present
              status: pass
              expected:
                - $run: withdraw
                - $unordered:
                  - balance: "50"
                  - transaction_count: "1"
              traces:
                - Event: { name: balance, value: "100" }
                - Event: { name: transaction_count, value: "0" }
                - Run: { operation: withdraw }
                - Event: { name: balance, value: "50" }
                - Event: { name: transaction_count, value: "1" }
            - name: unordered_reversed_still_passes
              status: pass
              expected:
                - $run: withdraw
                - $unordered:
                  - transaction_count: "1"
                  - balance: "50"
              traces:
                - Event: { name: balance, value: "100" }
                - Event: { name: transaction_count, value: "0" }
                - Run: { operation: withdraw }
                - Event: { name: balance, value: "50" }
                - Event: { name: transaction_count, value: "1" }
            - name: unordered_wrong_value_fails
              status: fail
              expected:
                - $run: withdraw
                - $unordered:
                  - balance: "999"
                  - transaction_count: "1"
              traces:
                - Event: { name: balance, value: "100" }
                - Event: { name: transaction_count, value: "0" }
                - Run: { operation: withdraw }
                - Event: { name: balance, value: "50" }
                - Event: { name: transaction_count, value: "1" }
            - name: unordered_multiple_blocks
              status: pass
              expected:
                - $unordered:
                  - balance: "100"
                  - transaction_count: "0"
                - $run: withdraw
                - $unordered:
                  - balance: "50"
                  - transaction_count: "1"
              traces:
                - Event: { name: balance, value: "100" }
                - Event: { name: transaction_count, value: "0" }
                - Run: { operation: withdraw }
                - Event: { name: balance, value: "50" }
                - Event: { name: transaction_count, value: "1" }

  - name: anywhere_event_matching
    desc: $anywhere matches events regardless of position in trace
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/anywhere_event.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: anywhere_matches_early_event
              status: pass
              expected:
                - $run: increment_twice
                - count: "2"
                - $anywhere:
                  - count: "0"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }
            - name: anywhere_matches_late_event
              status: pass
              expected:
                - count: "0"
                - $run: increment_twice
                - $anywhere:
                  - count: "2"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }
            - name: anywhere_matches_middle_event
              status: pass
              expected:
                - $anywhere:
                  - count: "1"
                - $run: increment_twice
                - count: "2"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }
            - name: anywhere_multiple_items
              status: pass
              expected:
                - $anywhere:
                  - count: "0"
                  - count: "1"
                  - count: "2"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }
            - name: anywhere_missing_fails
              status: fail
              expected:
                - $anywhere:
                  - count: "999"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }

  - name: keyword_collision_operation_named_run
    desc: Operation named "run" works with $run prefix — no collision
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/keyword_collision.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: operation_named_run
              status: pass
              expected:
                - $run: run
                - $result: "executed: test"
              traces:
                - Run: { operation: run }
                - Event: { name: run.input, value: "test" }
                - Event: { name: $result, value: "executed: test" }

  # ================================================================
  # Normative strength — level: must/should/may
  # ================================================================

  - name: provenance_passes_through
    desc: Source metadata and level are included in CaseResult
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/provenance_example.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: add_with_provenance
              status: pass
              level: must
              source:
                assertion_ids: [TEST-A1, TEST-A2]
                spec: "Test Specification v1.0"
                section: "§3.1"
              expected:
                - $result: "5"
              traces:
                - Run: { operation: add }
                - Event: { name: add.a, value: "2" }
                - Event: { name: add.b, value: "3" }
                - Event: { name: $result, value: "5" }

  - name: level_may_missing_skips
    desc: MAY operation not implemented — case is skipped, not an error
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/level_may_missing.spec.yaml
    expected:
