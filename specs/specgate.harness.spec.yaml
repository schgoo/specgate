# yaml-language-server: $schema=../spec-schema.json
# SpecGate component: specgate.harness
#
# The unified harness. Takes one input: a path to a spec file.
# The spec file declares its binding (which points to the crate under test).
# The harness resolves the binding, generates tests, runs them, and
# produces per-case results with expected and actual traces.
#
# Trace comparison rules:
#   - Run events are strictly ordered (they define the sequence of operations)
#   - Event entries between two Run markers are compared as a SET (order
#     does not matter). This accommodates non-deterministic field iteration.
#   - Events before the first Run and after the last Run are also sets.
#
# Downstream consumers (comparison engine, reporter, diff tool) read
# the harness output to produce human-readable reports.

name: specgate.harness
binding: bindings/rust.yaml

inputs:
  spec:
    type: string
    desc: Path to the spec YAML file (relative to repo root)

outcome:
  oneof: [Complete, Error]

outputs:
  when Complete:
    results: List<CaseResult>
  when Error:
    reason: string

types:
  TraceEvent:
    oneof:
      Event: { name: string, value: string }
      Run: { operation: string }

  CaseResult:
    name: string
    status: string
    expected_traces: List<TraceEvent>
    actual_traces: List<TraceEvent>

cases:

  # ===== Stateless operation =====

  - name: stateless_return_value
    desc: Stateless function captures return value as trace event
    inputs:
      spec: rust/crates/specgate-fixtures/specs/stateless_add.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: add_2_3
          status: pass
          expected_traces:
            - Run: { operation: add }
            - Event: { name: add.a, value: "2" }
            - Event: { name: add.b, value: "3" }
            - Event: { name: add.result, value: "5" }
          actual_traces:
            - Run: { operation: add }
            - Event: { name: add.a, value: "2" }
            - Event: { name: add.b, value: "3" }
            - Event: { name: add.result, value: "5" }

  # ===== StateMachine — before/after capture =====

  - name: statemachine_before_after
    desc: StateMachine captures field state before and after the operation
    inputs:
      spec: rust/crates/specgate-fixtures/specs/statemachine_counter.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: increment_once
          status: pass
          expected_traces:
            - Event: { name: count, value: "0" }
            - Run: { operation: increment }
            - Event: { name: count, value: "1" }
          actual_traces:
            - Event: { name: count, value: "0" }
            - Run: { operation: increment }
            - Event: { name: count, value: "1" }

  # ===== Multiple field capture =====

  - name: multi_field_capture
    desc: Multiple annotated fields are all captured before/after
    inputs:
      spec: rust/crates/specgate-fixtures/specs/multi_field_capture.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: withdraw_50
          status: pass
          expected_traces:
            - Event: { name: balance, value: "100" }
            - Event: { name: transaction_count, value: "0" }
            - Run: { operation: withdraw }
            - Event: { name: withdraw.amount, value: "50" }
            - Event: { name: balance, value: "50" }
            - Event: { name: transaction_count, value: "1" }
          actual_traces:
            - Event: { name: balance, value: "100" }
            - Event: { name: transaction_count, value: "0" }
            - Run: { operation: withdraw }
            - Event: { name: withdraw.amount, value: "50" }
            - Event: { name: balance, value: "50" }
            - Event: { name: transaction_count, value: "1" }

  # ===== Event order between Runs is unordered =====

  - name: event_order_between_runs
    desc: Events between Run markers match as a set — field order doesn't matter
    inputs:
      spec: rust/crates/specgate-fixtures/specs/multi_field_capture_reordered.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: withdraw_50
          status: pass
          expected_traces:
            - Event: { name: transaction_count, value: "0" }
            - Event: { name: balance, value: "100" }
            - Run: { operation: withdraw }
            - Event: { name: withdraw.amount, value: "50" }
            - Event: { name: transaction_count, value: "1" }
            - Event: { name: balance, value: "50" }
          actual_traces:
            - Event: { name: balance, value: "100" }
            - Event: { name: transaction_count, value: "0" }
            - Run: { operation: withdraw }
            - Event: { name: withdraw.amount, value: "50" }
            - Event: { name: balance, value: "50" }
            - Event: { name: transaction_count, value: "1" }

  # ===== Inline checkpoint =====

  - name: inline_checkpoint
    desc: spec_event!() emits an event at the point of invocation
    inputs:
      spec: rust/crates/specgate-fixtures/specs/checkpoint_inline.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: process_hello
          status: pass
          expected_traces:
            - Run: { operation: process }
            - Event: { name: process.data, value: " hello " }
            - Event: { name: after_upper, value: " HELLO " }
            - Event: { name: process.result, value: "HELLO" }
          actual_traces:
            - Run: { operation: process }
            - Event: { name: process.data, value: " hello " }
            - Event: { name: after_upper, value: " HELLO " }
            - Event: { name: process.result, value: "HELLO" }

  # ===== Multiple mutations in one operation =====

  - name: multi_mutation
    desc: Every mutation of an annotated field is captured, not just boundaries
    inputs:
      spec: rust/crates/specgate-fixtures/specs/multi_mutation.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: double_increment
          status: pass
          expected_traces:
            - Event: { name: count, value: "0" }
            - Run: { operation: increment_twice }
            - Event: { name: count, value: "1" }
            - Event: { name: count, value: "2" }
          actual_traces:
            - Event: { name: count, value: "0" }
            - Run: { operation: increment_twice }
            - Event: { name: count, value: "1" }
            - Event: { name: count, value: "2" }

  # ===== Nested operations =====

  - name: nested_operations
    desc: Nested operation calls produce sequential Run events with state between
    inputs:
      spec: rust/crates/specgate-fixtures/specs/nested_operations.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: transfer_50
          status: pass
          expected_traces:
            - Event: { name: balance, value: "100" }
            - Run: { operation: transfer }
            - Event: { name: transfer.amount, value: "50" }
            - Run: { operation: withdraw }
            - Event: { name: withdraw.amount, value: "50" }
            - Event: { name: balance, value: "50" }
            - Run: { operation: deposit }
            - Event: { name: deposit.amount, value: "50" }
            - Event: { name: balance, value: "100" }
          actual_traces:
            - Event: { name: balance, value: "100" }
            - Run: { operation: transfer }
            - Event: { name: transfer.amount, value: "50" }
            - Run: { operation: withdraw }
            - Event: { name: withdraw.amount, value: "50" }
            - Event: { name: balance, value: "50" }
            - Run: { operation: deposit }
            - Event: { name: deposit.amount, value: "50" }
            - Event: { name: balance, value: "100" }

  # ===== Trace mismatch — failure detection =====

  - name: mismatch_wrong_value
    desc: When actual traces differ from expected, status is fail
    inputs:
      spec: rust/crates/specgate-fixtures/specs/statemachine_counter_wrong.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: increment_once
          status: fail
          expected_traces:
            - Event: { name: count, value: "0" }
            - Run: { operation: increment }
            - Event: { name: count, value: "999" }
          actual_traces:
            - Event: { name: count, value: "0" }
            - Run: { operation: increment }
            - Event: { name: count, value: "1" }

  # ===== Error: bad spec =====

  - name: error_bad_yaml
    desc: Invalid YAML produces an error
    inputs:
      spec: rust/crates/specgate-fixtures/specs/bad_yaml.spec.yaml
    expected:
      outcome: Error

  # ===== Error: bad binding =====

  - name: error_bad_binding
    desc: Spec referencing nonexistent binding produces an error
    inputs:
      spec: rust/crates/specgate-fixtures/specs/bad_binding.spec.yaml
    expected:
      outcome: Error

  # ===== Multiple cases in one spec =====

  - name: multiple_cases_one_spec
    desc: Two test cases in one spec both produce results
    inputs:
      spec: rust/crates/specgate-fixtures/specs/multi_case.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: add_2_3
          status: pass
          expected_traces:
            - Run: { operation: add }
            - Event: { name: add.a, value: "2" }
            - Event: { name: add.b, value: "3" }
            - Event: { name: add.result, value: "5" }
          actual_traces:
            - Run: { operation: add }
            - Event: { name: add.a, value: "2" }
            - Event: { name: add.b, value: "3" }
            - Event: { name: add.result, value: "5" }
        - name: add_10_20
          status: pass
          expected_traces:
            - Run: { operation: add }
            - Event: { name: add.a, value: "10" }
            - Event: { name: add.b, value: "20" }
            - Event: { name: add.result, value: "30" }
          actual_traces:
            - Run: { operation: add }
            - Event: { name: add.a, value: "10" }
            - Event: { name: add.b, value: "20" }
            - Event: { name: add.result, value: "30" }

  # ===== Setup with parameters =====

  - name: setup_with_input_params
    desc: Setup function parameters are traced
    inputs:
      spec: rust/crates/specgate-fixtures/specs/setup_with_params.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: start_at_10
          status: pass
          expected_traces:
            - Event: { name: make_counter.initial, value: "10" }
            - Event: { name: count, value: "10" }
            - Run: { operation: increment }
            - Event: { name: count, value: "11" }
          actual_traces:
            - Event: { name: make_counter.initial, value: "10" }
            - Event: { name: count, value: "10" }
            - Run: { operation: increment }
            - Event: { name: count, value: "11" }

  # ===== Multiple setup functions =====

  - name: multiple_setups
    desc: Two setup functions create two objects for one operation
    inputs:
      spec: rust/crates/specgate-fixtures/specs/multi_setup.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: transfer_between_accounts
          status: pass
          expected_traces:
            - Event: { name: source.balance, value: "100" }
            - Event: { name: target.balance, value: "0" }
            - Run: { operation: transfer }
            - Event: { name: transfer.amount, value: "50" }
            - Event: { name: source.balance, value: "50" }
            - Event: { name: target.balance, value: "50" }
          actual_traces:
            - Event: { name: source.balance, value: "100" }
            - Event: { name: target.balance, value: "0" }
            - Run: { operation: transfer }
            - Event: { name: transfer.amount, value: "50" }
            - Event: { name: source.balance, value: "50" }
            - Event: { name: target.balance, value: "50" }

  # ===== Multi-step state machine =====

  - name: multi_step_sequence
    desc: Two operations in sequence with state tracked between
    inputs:
      spec: rust/crates/specgate-fixtures/specs/multi_step.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: increment_then_decrement
          status: pass
          expected_traces:
            - Event: { name: count, value: "0" }
            - Run: { operation: increment }
            - Event: { name: count, value: "1" }
            - Run: { operation: decrement }
            - Event: { name: count, value: "0" }
          actual_traces:
            - Event: { name: count, value: "0" }
            - Run: { operation: increment }
            - Event: { name: count, value: "1" }
            - Run: { operation: decrement }
            - Event: { name: count, value: "0" }

  # ===== Mock dependency =====

  - name: mock_records_interaction
    desc: Mock captures request/response as trace events
    inputs:
      spec: rust/crates/specgate-fixtures/specs/mock_field.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: fetch_returns_alice
          status: pass
          expected_traces:
            - Run: { operation: fetch_user }
            - Event: { name: db.request, value: "user_1" }
            - Event: { name: db.response, value: "Alice" }
            - Event: { name: fetch_user.result, value: "Alice" }
          actual_traces:
            - Run: { operation: fetch_user }
            - Event: { name: db.request, value: "user_1" }
            - Event: { name: db.response, value: "Alice" }
            - Event: { name: fetch_user.result, value: "Alice" }

  # ===== Mismatch: missing event =====

  - name: mismatch_missing_event
    desc: Spec expects an event the implementation doesn't produce
    inputs:
      spec: rust/crates/specgate-fixtures/specs/mismatch_missing_event.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: add_2_3
          status: fail

  # ===== Mismatch: extra event =====

  - name: mismatch_extra_event
    desc: Spec expects fewer events than implementation produces
    inputs:
      spec: rust/crates/specgate-fixtures/specs/mismatch_extra_event.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: add_2_3
          status: fail

  # ===== Mismatch: wrong order across Run boundary =====

  - name: mismatch_wrong_order
    desc: Event placed in wrong Run group
    inputs:
      spec: rust/crates/specgate-fixtures/specs/mismatch_wrong_order.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: increment_once
          status: fail

  # ===== Mismatch: wrong operation name =====

  - name: mismatch_wrong_operation
    desc: Spec expects different operation name than actual
    inputs:
      spec: rust/crates/specgate-fixtures/specs/mismatch_wrong_op.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: increment_once
          status: fail

  # ===== Mismatch: wrong field name =====

  - name: mismatch_wrong_field
    desc: Spec expects different field name than actual
    inputs:
      spec: rust/crates/specgate-fixtures/specs/mismatch_wrong_field.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: increment_once
          status: fail

  # ===== Mismatch: wrong value on second step =====

  - name: mismatch_second_step
    desc: First step passes but second step has wrong expected value
    inputs:
      spec: rust/crates/specgate-fixtures/specs/mismatch_second_step.spec.yaml
    expected:
      outcome: Complete
      results:
        - name: increment_then_decrement
          status: fail

  # ===== Error: missing setup annotation =====

  - name: error_missing_setup
    desc: Spec references a setup not annotated in source
    inputs:
      spec: rust/crates/specgate-fixtures/specs/missing_setup.spec.yaml
    expected:
      outcome: Error

  # ===== Error: missing operation annotation =====

  - name: error_missing_operation
    desc: Spec references an operation not annotated in source
    inputs:
      spec: rust/crates/specgate-fixtures/specs/missing_operation.spec.yaml
    expected:
      outcome: Error

  # ===== Error: source doesn't compile =====

  - name: error_compile_failure
    desc: Source has a syntax error
    inputs:
      spec: rust/crates/specgate-fixtures/specs/compile_error.spec.yaml
    expected:
      outcome: Error

  # ===== Error: no cases in spec =====

  - name: error_no_cases
    desc: Spec with no test cases
    inputs:
      spec: rust/crates/specgate-fixtures/specs/no_cases.spec.yaml
    expected:
      outcome: Error
