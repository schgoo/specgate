# yaml-language-server: $schema=../spec-schema.json
# SpecGate component: specgate.harness
#
# The unified harness. Compiles annotated code, runs operations, collects
# traces, and compares against expected assertions.
#
# Trace matching rules:
#   - Ordered assertions matched as subsequence (gaps allowed)
#   - "$run: operation" matches a Run event
#   - "name: value" matches an Event with that name and value
#   - "$unordered: [...]" — all items must appear, any order, between surrounding ordered items
#   - "$anywhere: [...]" — items must appear somewhere in the trace, position irrelevant

spec_version: "0.4.0"
name: specgate.harness
binding: bindings/rust.yaml

types:
  TraceEvent:
    oneof:
      Event: { span: string, name: string, value: string }
      Run: { span: string, operation: string }

  Assertion:
    oneof:
      Event: { name: string, value: string }
      $run: { operation: string }
      $unordered: { items: List<Assertion> }
      $anywhere: { items: List<Assertion> }

  CaseResult:
    name: string
    status:
      oneof: [pass, fail, skip, warn]
    expected: List<Assertion>
    traces: List<TraceEvent>

operations:
  run_spec:
    desc: Run all test cases in a spec file and return results with traces.
    inputs:
      spec:
        type: string
        desc: Path to the spec YAML file (relative to repo root)
    outputs:
      - outcome:
          oneof:
            Complete:
              results: List<CaseResult>
            Error:
              reason: string

  mechanism_proof:
    kind: command
    desc: >
      Compile fixtures and verify annotations emit real traces.
      Runs cargo test --test mechanism_proof.
    outputs:
      - outcome:
          oneof:
            Complete: {}
            Error: {}

  check_fixtures:
    kind: command
    desc: >
      Verify that the specgate-fixtures crate compiles with current annotations.
      Runs cargo check on the fixtures crate.
    outputs:
      - outcome:
          oneof:
            Complete: {}
            Error: {}

cases:

  # ================================================================
  # Mechanism constraints
  # ================================================================

  - name: harness_compiles_and_emits_traces
    operation: mechanism_proof
    desc: >
      Annotations expand into real trace-emitting code at compile time.
      Calling annotated functions and checking traces proves compilation
      happened and macros are not no-ops.
    expected:
      outcome:
        Complete: {}

  - name: fixtures_compile
    operation: check_fixtures
    desc: >
      The specgate-fixtures crate must compile with the current annotations.
      This forces the annotations crate to handle #[derive(SpecEvent)],
      #[spec_operation], #[spec_setup], #[spec_mock], and spec_trace!.
    expected:
      outcome:
        Complete: {}

  - name: no_source_interpretation
    kind: narrative
    desc: >
      The harness must not interpret Rust source with syn. It must shell out
      to cargo to compile and run annotated code. An earlier implementation
      used source interpretation as a shortcut — it passed all spec-driven
      tests but could not handle real-world code.
    verify:
      - Confirm no syn-based expression evaluation in harness source
      - The harness should invoke cargo build/test, not evaluate Rust in-process

  - name: paths_resolve_relative_to_spec
    kind: narrative
    desc: >
      All paths in a spec (binding, fixture source) must resolve relative to
      the spec file's location, not the working directory of the test runner.
      Generated Cargo.toml paths must use forward slashes or properly escape
      backslashes to avoid TOML unicode escape interpretation on Windows.
    verify:
      - Run `cargo test -p specgate-harness --test specgate_harness_spec` from the workspace root
      - All Complete-outcome cases must find their fixture source and binding
      - Generated Cargo.toml must not contain raw backslash paths

  # ================================================================
  # Happy path — basic operations
  # ================================================================

  - name: stateless_return_value
    desc: Stateless function captures return value
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/stateless_add.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: add_2_3
              status: pass
              expected:
                - add.result: "5"
              traces:
                - Run: { operation: add }
                - Event: { name: add.a, value: "2" }
                - Event: { name: add.b, value: "3" }
                - Event: { name: add.result, value: "5" }

  - name: statemachine_before_after
    desc: StateMachine captures field state before and after
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/statemachine_counter.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: increment_once
              status: pass
              expected:
                - count: "0"
                - $run: increment
                - count: "1"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment }
                - Event: { name: count, value: "1" }

  - name: multi_field_capture
    desc: Multiple annotated fields all captured
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/multi_field_capture.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: withdraw_50
              status: pass
              expected:
                - balance: "100"
                - $run: withdraw
                - balance: "50"
                - transaction_count: "1"
              traces:
                - Event: { name: balance, value: "100" }
                - Event: { name: transaction_count, value: "0" }
                - Run: { operation: withdraw }
                - Event: { name: balance, value: "50" }
                - Event: { name: transaction_count, value: "1" }

  - name: inline_checkpoint
    desc: spec_event!() emits an event at invocation point
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/checkpoint_inline.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: process_hello
              status: pass
              expected:
                - $run: process
                - after_upper: " HELLO "
                - process.result: "HELLO"
              traces:
                - Run: { operation: process }
                - Event: { name: after_upper, value: " HELLO " }
                - Event: { name: process.result, value: "HELLO" }

  - name: multi_mutation
    desc: Every mutation of an annotated field is captured
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/multi_mutation.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: double_increment
              status: pass
              expected:
                - count: "0"
                - $run: increment_twice
                - count: "1"
                - count: "2"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }

  - name: nested_operations
    desc: Nested calls produce sequential Run events
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/nested_operations.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: transfer_50
              status: pass
              expected:
                - balance: "100"
                - $run: transfer
                - $run: withdraw
                - balance: "50"
                - $run: deposit
                - balance: "100"
              traces:
                - Event: { name: balance, value: "100" }
                - Run: { operation: transfer }
                - Run: { operation: withdraw }
                - Event: { name: balance, value: "50" }
                - Run: { operation: deposit }
                - Event: { name: balance, value: "100" }

  # ================================================================
  # Happy path — setup variations
  # ================================================================

  - name: setup_with_input_params
    desc: Setup function parameters are traced
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/setup_with_params.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: start_at_10
              status: pass
              expected:
                - make_counter.initial: "10"
                - count: "10"
                - $run: increment
                - count: "11"
              traces:
                - Event: { name: make_counter.initial, value: "10" }
                - Event: { name: count, value: "10" }
                - Run: { operation: increment }
                - Event: { name: count, value: "11" }

  - name: multiple_setups
    desc: Two setup functions create two objects for one operation
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/multi_setup.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: transfer_between_accounts
              status: pass
              expected:
                - source.balance: "100"
                - target.balance: "0"
                - $run: transfer
                - source.balance: "50"
                - target.balance: "50"
              traces:
                - Event: { name: source.balance, value: "100" }
                - Event: { name: target.balance, value: "0" }
                - Run: { operation: transfer }
                - Event: { name: source.balance, value: "50" }
                - Event: { name: target.balance, value: "50" }

  # ================================================================
  # Happy path — multi-case and multi-step
  # ================================================================

  - name: multiple_cases_one_spec
    desc: Two test cases in one spec both produce results
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/multi_case.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: add_2_3
              status: pass
              expected:
                - add.result: "5"
            - name: add_10_20
              status: pass
              expected:
                - add.result: "30"

  - name: multi_step_sequence
    desc: Two operations in sequence with state tracked
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/multi_step.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: increment_then_decrement
              status: pass
              expected:
                - count: "0"
                - $run: increment
                - count: "1"
                - $run: decrement
                - count: "0"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment }
                - Event: { name: count, value: "1" }
                - Run: { operation: decrement }
                - Event: { name: count, value: "0" }

  # ================================================================
  # Happy path — mocks
  # ================================================================

  - name: mock_call_site
    desc: Mock intercepts call and returns configured value
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/mock_field.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: find_user_1
              status: pass
              expected:
                - $run: get_user
                - db.request: "user_1"
                - db.response: "Alice"
                - get_user.result: "Alice"
              traces:
                - Run: { operation: get_user }
                - Event: { name: db.request, value: "user_1" }
                - Event: { name: db.response, value: "Alice" }
                - Event: { name: get_user.result, value: "Alice" }

  - name: mock_multi_response
    desc: Mock returns different values for different inputs
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/mock_multi_response.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: get_two_different_users
              status: pass
              expected:
                - $run: get_users
                - db.request: "user_1"
                - db.response: "Alice"
                - db.request: "user_2"
                - db.response: "Bob"
                - get_users.result: "Alice and Bob"
              traces:
                - Run: { operation: get_users }
                - Event: { name: db.request, value: "user_1" }
                - Event: { name: db.response, value: "Alice" }
                - Event: { name: db.request, value: "user_2" }
                - Event: { name: db.response, value: "Bob" }
                - Event: { name: get_users.result, value: "Alice and Bob" }

  - name: mock_input_not_in_table
    desc: Mock called with unknown input produces error event
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/mock_not_found.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: query_unknown_user
              status: pass
              expected:
                - db.request: "user_99"
                - db.error: "no mock response for input 'user_99'"

  # ================================================================
  # Happy path — Result and special returns
  # ================================================================

  - name: result_ok_path
    desc: Operation returning Ok produces outcome Ok
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/result_ok.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: divide_10_by_2
              status: pass
              expected:
                - divide.outcome: "Ok"
                - divide.result: "5"
              traces:
                - Event: { name: divide.outcome, value: "Ok" }
                - Event: { name: divide.result, value: "5" }

  - name: result_err_path
    desc: Operation returning Err produces outcome Error
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/result_err.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: divide_by_zero
              status: pass
              expected:
                - divide.outcome: "Error"
                - divide.error: "division by zero"
              traces:
                - Event: { name: divide.outcome, value: "Error" }
                - Event: { name: divide.error, value: "division by zero" }

  - name: unrecoverable_panic
    desc: Operation that panics produces Unrecoverable outcome
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/unrecoverable.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: divide_by_zero_panics
              status: pass
              expected:
                - divide.outcome: "Unrecoverable"
                - divide.error: "attempt to divide by zero"

  - name: option_some_path
    desc: Operation returning Some produces outcome Some with value
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/option_some.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: find_existing
              status: pass
              expected:
                - find.outcome: "Some"
                - find.value: "1"
              traces:
                - Event: { name: find.outcome, value: "Some" }
                - Event: { name: find.value, value: "1" }

  - name: option_none_path
    desc: Operation returning None produces outcome None
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/option_none.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: find_missing
              status: pass
              expected:
                - find.outcome: "None"
              traces:
                - Event: { name: find.outcome, value: "None" }

  - name: void_operation
    desc: Void operation produces no result event
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/void_operation.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: log_a_message
              status: pass
              expected:
                - count: "0"
                - $run: log
                - count: "1"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: log }
                - Event: { name: count, value: "1" }

  - name: readonly_operation
    desc: Read-only operation returns value without state change
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/readonly_operation.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: read_count
              status: pass
              expected:
                - get_count.result: "42"

  # ================================================================
  # Subsequence matching — field order doesn't matter
  # ================================================================

  - name: event_order_between_runs
    desc: Asserting on final values works regardless of field iteration order
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/multi_field_capture_reordered.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: withdraw_50
              status: pass
              expected:
                - balance: "50"
                - transaction_count: "1"

  # ================================================================
  # Mismatch — failures detected
  # ================================================================

  - name: mismatch_wrong_value
    desc: Wrong expected value produces fail
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/statemachine_counter_wrong.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: increment_once
              status: fail
              expected:
                - count: "999"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment }
                - Event: { name: count, value: "1" }

  - name: mismatch_missing_field
    desc: Expected field not in traces produces fail
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/mismatch_missing_event.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: add_2_3
              status: fail
              expected:
                - add.result: "5"
                - add.extra: "bonus"
              traces:
                - Run: { operation: add }
                - Event: { name: add.a, value: "2" }
                - Event: { name: add.b, value: "3" }
                - Event: { name: add.result, value: "5" }

  - name: mismatch_wrong_field_name
    desc: Expected field name differs from actual
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/mismatch_wrong_field.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: increment_once
              status: fail
              expected:
                - total: "1"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment }
                - Event: { name: count, value: "1" }

  - name: mismatch_second_step
    desc: First step OK but second step has wrong value
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/mismatch_second_step.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: increment_then_decrement
              status: fail
              expected:
                - $run: decrement
                - count: "999"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment }
                - Event: { name: count, value: "1" }
                - Run: { operation: decrement }
                - Event: { name: count, value: "0" }

  # ================================================================
  # Subsequence matching — order matters
  # ================================================================

  - name: subsequence_wrong_order
    desc: Expected events in wrong order produces fail
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/subsequence_wrong_order.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: increment_once
              status: fail
              expected:
                - count: "1"
                - count: "0"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment }
                - Event: { name: count, value: "1" }

  - name: subsequence_with_gaps
    desc: Matching with gaps between expected events
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/subsequence_with_gaps.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: double_increment
              status: pass
              expected:
                - count: "0"
                - count: "2"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }

  # ================================================================
  # Matching directives — $unordered, $anywhere, $run collision
  # ================================================================

  - name: unordered_field_matching
    desc: $unordered block matches fields in any order between ordered items
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/unordered_fields.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: unordered_both_present
              status: pass
              expected:
                - $run: withdraw
                - $unordered:
                  - balance: "50"
                  - transaction_count: "1"
              traces:
                - Event: { name: balance, value: "100" }
                - Event: { name: transaction_count, value: "0" }
                - Run: { operation: withdraw }
                - Event: { name: balance, value: "50" }
                - Event: { name: transaction_count, value: "1" }
            - name: unordered_reversed_still_passes
              status: pass
              expected:
                - $run: withdraw
                - $unordered:
                  - transaction_count: "1"
                  - balance: "50"
              traces:
                - Event: { name: balance, value: "100" }
                - Event: { name: transaction_count, value: "0" }
                - Run: { operation: withdraw }
                - Event: { name: balance, value: "50" }
                - Event: { name: transaction_count, value: "1" }
            - name: unordered_wrong_value_fails
              status: fail
              expected:
                - $run: withdraw
                - $unordered:
                  - balance: "999"
                  - transaction_count: "1"
              traces:
                - Event: { name: balance, value: "100" }
                - Event: { name: transaction_count, value: "0" }
                - Run: { operation: withdraw }
                - Event: { name: balance, value: "50" }
                - Event: { name: transaction_count, value: "1" }
            - name: unordered_multiple_blocks
              status: pass
              expected:
                - $unordered:
                  - balance: "100"
                  - transaction_count: "0"
                - $run: withdraw
                - $unordered:
                  - balance: "50"
                  - transaction_count: "1"
              traces:
                - Event: { name: balance, value: "100" }
                - Event: { name: transaction_count, value: "0" }
                - Run: { operation: withdraw }
                - Event: { name: balance, value: "50" }
                - Event: { name: transaction_count, value: "1" }

  - name: anywhere_event_matching
    desc: $anywhere matches events regardless of position in trace
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/anywhere_event.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: anywhere_matches_early_event
              status: pass
              expected:
                - $run: increment_twice
                - count: "2"
                - $anywhere:
                  - count: "0"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }
            - name: anywhere_matches_late_event
              status: pass
              expected:
                - count: "0"
                - $run: increment_twice
                - $anywhere:
                  - count: "2"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }
            - name: anywhere_matches_middle_event
              status: pass
              expected:
                - $anywhere:
                  - count: "1"
                - $run: increment_twice
                - count: "2"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }
            - name: anywhere_multiple_items
              status: pass
              expected:
                - $anywhere:
                  - count: "0"
                  - count: "1"
                  - count: "2"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }
            - name: anywhere_missing_fails
              status: fail
              expected:
                - $anywhere:
                  - count: "999"
              traces:
                - Event: { name: count, value: "0" }
                - Run: { operation: increment_twice }
                - Event: { name: count, value: "1" }
                - Event: { name: count, value: "2" }

  - name: keyword_collision_operation_named_run
    desc: Operation named "run" works with $run prefix — no collision
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/keyword_collision.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: operation_named_run
              status: pass
              expected:
                - $run: run
                - run.result: "executed: test"
              traces:
                - Run: { operation: run }
                - Event: { name: run.input, value: "test" }
                - Event: { name: run.result, value: "executed: test" }

