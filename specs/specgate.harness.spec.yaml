# yaml-language-server: $schema=../spec-schema.json
# SpecGate component: specgate.harness
#
# The unified harness. Compiles annotated code, runs operations, collects
# traces, and compares against expected assertions.
#
# Trace matching rules:
#   - Ordered assertions matched as subsequence (gaps allowed)
#   - "$run: operation" matches a Run event
#   - "name: value" matches an Event with that name and value
#   - "$unordered: [...]" — all items must appear, any order, between surrounding ordered items
#   - "$anywhere: [...]" — items must appear somewhere in the trace, position irrelevant

spec_version: "0.4.0"
name: specgate.harness
binding: bindings/rust.yaml

types:
  Value:
    desc: >
      Trace event values can be scalars or structured (collections).
      The matcher compares based on type: strings use equality,
      lists use subsequence (or $unordered), maps check key+value,
      sets check presence. None/null values are represented by the
      absence of the event — no event emitted means the field is null.
    oneof:
      String: string
      Integer: i64
      Float: f64
      Bool: bool
      List: List<Value>
      Map: Map<string, Value>
      Set: Set<Value>

  TraceEvent:
    oneof:
      Event: { span: string, name: string, value: Value }
      Run: { span: string, operation: string }

  Assertion:
    desc: >
      Expected assertions support exact values, structured values
      (lists, maps), and $-operators for flexible matching.
    oneof:
      Event: { name: string, value: Value }
      $run: { operation: string }
      $unordered: { items: List<Assertion> }
      $anywhere: { items: List<Assertion> }

  Source:
    assertion_ids: List<string>
    spec: string
    section: string

  CaseResult:
    name: string
    status:
      oneof: [pass, fail, skip, warn]
    kind:
      oneof: [standard, property]
      default: standard
    level:
      oneof: [must, should, may]
    source: Source  # optional
    # Standard case fields
    expected: List<Assertion>
    traces: List<TraceEvent>
    # Property case fields (only when kind: property)
    counterexample: Map<string, Value>  # generator values that caused failure (only on fail)
    # traces: included on property fail — the trace from the counterexample run

operations:
  run_spec:
    desc: Run all test cases in a spec file and return results with traces.
    inputs:
      spec:
        type: string
        desc: Path to the spec YAML file (relative to repo root)
    outputs:
      - outcome:
          oneof:
            Complete:
              results: List<CaseResult>
            Error:
              reason: string

  mechanism_proof:
    kind: command
    desc: >
      Compile fixtures and verify annotations emit real traces.
      Runs cargo test --test mechanism_proof.
    outputs:
      - outcome:
          oneof:
            Complete: {}
            Error: {}

  check_fixtures:
    kind: command
    desc: >
      Verify that the specgate-fixtures crate compiles with current annotations.
      Runs cargo check on the fixtures crate.
    outputs:
      - outcome:
          oneof:
            Complete: {}
            Error: {}

cases:

  # ================================================================
  # Mechanism constraints
  # ================================================================

  - name: harness_compiles_and_emits_traces
    operation: mechanism_proof
    desc: >
      Annotations expand into real trace-emitting code at compile time.
      Calling annotated functions and checking traces proves compilation
      happened and macros are not no-ops.
    expected:
      outcome:
        Complete: {}

  - name: fixtures_compile
    operation: check_fixtures
    desc: >
      The specgate-fixtures crate must compile with the current annotations.
      This forces the annotations crate to handle #[derive(SpecEvent)],
      #[spec_operation], #[spec_setup], #[spec_mock], and spec_trace!.
    expected:
      outcome:
        Complete: {}

  - name: discovery_registry_handles_methods_and_duplicates
    kind: narrative
    desc: >
      Annotation metadata discovery must register free functions, method
      operations, and setups without compile failures, even when multiple
      source files reuse the same operation name. The discovery JSON exposed
      by the runtime must stay valid and include those registered entries.
    verify:
      - Method operations annotated inside impl blocks compile successfully and register metadata
      - #[spec_setup] functions register metadata with is_setup: true
      - Reusing the same operation name in different source files does not cause registry symbol collisions
      - specgate_runtime::discovery_json() returns valid JSON listing the registered operations

  - name: command_target_executes_binding_command
    kind: narrative
    desc: >
      A spec whose binding selects a command target is verified by running that
      shell command and checking its exit status (exit 0 = pass), not by
      compiling and tracing a source file. The command_target fixture
      (binding_command.yaml, target: check, operation kind: command) covers
      this path. Note: run_spec resolves a source file and therefore does not
      execute command targets — they are exercised through the CLI run path.
    verify:
      - The command_target fixture's check operation is declared kind:command
      - A command target passes when its shell command exits 0
      - run_spec is source-oriented and does not execute command targets

  - name: language_neutral_input_names
    kind: narrative
    desc: >
      A spec names operation and setup inputs in its own language-neutral
      vocabulary, independent of the implementation's parameter names. Code
      annotates a parameter with #[spec_input("name")] to bind it to the spec
      name; the harness binds case inputs and emits `op.<name>` events using
      that name. Without the attribute the spec name defaults to the code
      parameter name.
    verify:
      - named_inputs completes — divide's params a/b are addressed as numerator/denominator
      - The echoed input events use the spec names (divide.numerator, divide.denominator)
      - A setup param renamed with #[spec_input] binds its construction input by the spec name

  - name: invisible_setups
    kind: narrative
    desc: >
      Setups are invisible to the spec: a spec never names a setup function,
      declares `kind: setup`, or carries `setup:` on a case. A setup is linked
      in code via #[spec_setup("operation")] and constructs the operation's
      receiver or a parameter, matched by return type. When several parameters
      share that type, or several setups produce it, each setup pins its target
      with fills = "<param>" (which may be stacked to fill several params from
      one function). Construction inputs are declared as ordinary operation
      inputs, scoped by parameter role when needed. Side-effect setups (no
      consumed return) are simply invoked before the operation.
    verify:
      - statemachine_counter completes — a method receiver is built by its linked setup
      - setup_with_params completes — a setup's construction input is a declared operation input
      - multi_setup completes — two same-typed setups pinned with fills build source and target
      - shared_setup completes — one stacked-fills setup builds multiple same-typed params
      - side_effect_setup completes — a non-consumed setup is still invoked before the operation
      - A method operation with no setup for its receiver fails pre-flight with a precise error

  - name: multi_file_operations
    kind: narrative
    desc: >
      A single spec may define operations that live in different source
      files. The harness must discover and run every operation the spec
      references, regardless of which file each one is defined in.
    verify:
      - The multi_file fixture spec completes with all cases passing
      - Operations greet and farewell, defined in separate files, are both invoked
      - No case is skipped for a missing-source reason

  - name: no_source_interpretation
    kind: narrative
    desc: >
      The harness must not interpret Rust source with syn. It must shell out
      to cargo to compile and run annotated code. An earlier implementation
      used source interpretation as a shortcut — it passed all spec-driven
      tests but could not handle real-world code.
    verify:
      - No syn-based expression evaluation exists in harness source
      - The harness invokes cargo build/test, never evaluates Rust in-process

  - name: operation_inputs_emitted
    kind: narrative
    desc: >
      Every input parameter of an operation must be emitted to the trace as an
      `op.param` event, including complex inputs (structs, enums, lists, maps).
      A single non-primitive parameter must not suppress emission of the other
      parameters. This lets specs assert on what an operation received, not just
      what it produced.
    verify:
      - Complex (struct/enum/list/map) input parameters appear as op.param events
      - Primitive parameters are still emitted even when a sibling parameter is complex
      - Run complex_inputs.spec.yaml — input-echo expectations on lookup, describe_config, and describe_person pass

  - name: structured_values_not_stringified
    kind: narrative
    desc: >
      Collection fields (Vec, BTreeMap, BTreeSet) annotated with #[spec_event]
      must emit structured Value events (Value::List, Value::Map, Value::Set),
      not stringified representations. The codegen must use emit_event_v (or
      equivalent structured emission) for these types. Using format!("{}", x)
      to stringify a Vec into "["a", "b"]" is incorrect — the matcher cannot
      apply $size, $contains, $any operators on a plain string.
    verify:
      - 'Run structured_output.spec.yaml — list_exact_match expects value: ["ID"]'
      - 'If the trace contains value: "[\"ID\"]" (a string), matching will fail'

  - name: crate_dependency_not_path_include
    kind: narrative
    desc: >
      The generated runner must depend on the fixture crate as a Cargo
      dependency (in [dependencies] of the generated Cargo.toml), not use
      #[path = "..."] mod inclusion. #[path] inclusion breaks when the
      fixture uses external crate dependencies, cross-module imports, or
      build script generated code. The cross_dep fixture uses serde_yaml
      which is impossible to resolve via #[path] inclusion.
    verify:
      - Run cross_dep.spec.yaml — it uses serde_yaml
      - Check generated Cargo.toml has specgate-fixtures in [dependencies]
      - Generated main.rs uses "use specgate_fixtures::..." not "#[path]"

  - name: operators_work_on_structured_values
    kind: narrative
    desc: >
      Assertion operators ($size, $contains, $containsAll, $any, $every,
      $match, $excludes) operate on structured Value types, not strings.
      The matcher must parse the expected operator syntax and apply it
      against the actual Value in the trace event. String equality is
      only the default for scalar values without operators.
    verify:
      - Run operators.spec.yaml — $size on a list Value works
      - Run scalar_operators.spec.yaml — $gt on an integer Value works
      - A string value "3" does not satisfy $size: 3 (type mismatch)

  - name: generated_runner_uses_version_deps_from_crates_io
    kind: narrative
    desc: >
      When specgate-harness is installed from crates.io (not a path
      dependency), the generated runner Cargo.toml must use version
      dependencies (e.g. specgate-annotations = "0.1.1") instead of
      path dependencies. Path deps point to the registry cache which
      has no workspace structure. The harness detects whether it is
      running from a local workspace or from crates.io and adjusts
      the generated manifest accordingly.
    verify:
      - codegen with is_local=false produces version deps in the manifest
      - The version matches the harness crate's own version

  - name: umbrella_crate_re_exports_annotations_path
    kind: narrative
    desc: >
      The specgate umbrella crate must re-export specgate_annotations
      such that the path ::specgate_annotations resolves for any crate
      depending on specgate. The proc macros expand to
      ::specgate_annotations::__rt::emit_event(...) and this path must
      compile whether the user depends on specgate or specgate-annotations
      directly.
    verify:
      - specgate/src/lib.rs contains pub extern crate specgate_annotations
      - A crate depending only on specgate compiles with spec_operation

  - name: paths_resolve_relative_to_spec
    desc: >
      Spec at a deeply nested path resolves binding and fixture source
      correctly. Tests that the harness absolutizes paths before embedding
      them in the generated runner, so the runner finds files regardless
      of its own working directory.
    operation: run_spec
    inputs:
      spec: test/fixtures/nested/deep/path/nested_path.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: add_from_nested_path
              status: pass
              expected:
                - $result: "30"
              traces:
                - Run: { operation: add }
                - Event: { name: add.a, value: "10" }
                - Event: { name: add.b, value: "20" }
                - Event: { name: $result, value: "30" }

  - name: target_selection
    desc: >
      Spec with target: alt selects a different crate than the default.
      Proves the harness dispatches to the correct binding target.
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/target_selection.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: greet_world
              status: pass
              expected:
                - $result: "Hello, World!"
              traces:
                - Run: { operation: greet }
                - Event: { name: greet.name, value: "World" }
                - Event: { name: $result, value: "Hello, World!" }

  - name: per_case_target_override
    desc: >
      One spec with two cases using different targets. First case uses
      default target (add from fixtures), second overrides to alt (greet
      from fixtures-alt).
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/per_case_target.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: add_from_default
              status: pass
              expected:
                - $result: "3"
              traces:
                - Run: { operation: add }
                - Event: { name: add.a, value: "1" }
                - Event: { name: add.b, value: "2" }
                - Event: { name: $result, value: "3" }
            - name: greet_from_alt
              status: pass
              expected:
                - $result: "Hello, Test!"
              traces:
                - Run: { operation: greet }
                - Event: { name: greet.name, value: "Test" }
                - Event: { name: $result, value: "Hello, Test!" }

  - name: missing_target_error
    desc: Spec references a target that doesn't exist in the binding
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/missing_target.spec.yaml
    expected:
      outcome:
        Error:
          reason: "target 'nonexistent' not found in binding"

  - name: no_vacuous_match
    desc: >
      Non-empty expected with zero matching traces must fail, not pass.
      Prevents the harness from silently passing unparseable or impossible assertions.
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/vacuous_match.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: impossible_assertion
              status: fail
              expected:
                - nonexistent.field: "impossible"
              traces:
                - Run: { operation: add }
                - Event: { name: add.a, value: "2" }
                - Event: { name: add.b, value: "3" }
                - Event: { name: $result, value: "5" }

  - name: self_test_rejects_all_errors
    desc: >
      When the harness runs its own spec and every run_spec call returns
      an error (e.g. file not found), the self-test must fail — it must
      not pass vacuously.
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/stateless_add.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: add_2_3
              status: pass
              expected:
                - $result: "5"
              traces:
                - Run: { operation: add }
                - Event: { name: add.a, value: "2" }
                - Event: { name: add.b, value: "3" }
                - Event: { name: $result, value: "5" }

  # ================================================================
  # Crate dependency — #[path] inclusion cannot work (#7)
  # ================================================================

  - name: cross_crate_dependency
    desc: >
      Operation uses an external crate (serde_yaml). The harness must
      depend on the fixture crate as a Cargo dependency, not #[path]
      include the source file. This proves the harness handles real
      crate structures with external dependencies.
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/cross_dep.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: extract_yaml_value
              status: pass
              expected:
                - $result: "Customer"
              traces:
                - Run: { operation: parse_yaml_key }
                - Event: { name: parse_yaml_key.input, value: "name: Customer\nid: 42" }
                - Event: { name: parse_yaml_key.key, value: "name" }
                - Event: { name: $result, value: "Customer" }

  # ================================================================
  # Structured values — lists, maps, sets, $-operators
  # ================================================================

  - name: assertion_operators
    desc: All 9 assertion operators work correctly
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/operators.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: eq_scalar
              status: pass
              expected:
                - product_name: { $eq: "Milk" }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }
            - name: size_list
              status: pass
              expected:
                - tags: { $size: 3 }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }
            - name: size_map
              status: pass
              expected:
                - attributes: { $size: 2 }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }
            - name: contains_single
              status: pass
              expected:
                - tags: { $contains: "dairy" }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }
            - name: contains_all
              status: pass
              expected:
                - tags: { $containsAll: ["dairy", "organic"] }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }
            - name: excludes_values
              status: pass
              expected:
                - tags: { $excludes: ["expired", "recalled"] }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }
            - name: excludes_fails_when_present
              status: fail
              expected:
                - tags: { $excludes: ["dairy"] }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }
            - name: match_partial_object
              status: pass
              expected:
                - attributes: { $match: { "category": "food" } }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }
            - name: exists_field
              status: pass
              expected:
                - product_name: { $exists: true }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }
            - name: any_with_matcher
              status: pass
              expected:
                - tags: { $any: { $matches: "^org" } }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }
            - name: type_check
              status: pass
              expected:
                - product_name: { $type: "string" }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }
            - name: composed_operators
              status: pass
              expected:
                - tags: { $size: 3, $containsAll: ["dairy", "organic", "local"] }
              traces:
                - Run: { operation: get_product }
                - Event: { name: product_name, value: "Milk" }
                - Event: { name: price, value: 4 }
                - Event: { name: tags, value: ["dairy", "organic", "local"] }
                - Event: { name: attributes, value: {"category": "food", "origin": "local"} }

  - name: structured_list_matching
    desc: List outputs match with exact, $contains, $size, $any operators
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/structured_output.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: list_exact_match
              status: pass
              expected:
                - entity_name: "Customer"
                - key_properties: ["ID"]
                - structural_properties: ["ID", "Name", "Email"]
              traces:
                - Run: { operation: resolve_entity }
                - Event: { name: entity_name, value: "Customer" }
                - Event: { name: key_properties, value: ["ID"] }
                - Event: { name: structural_properties, value: ["ID", "Name", "Email"] }
            - name: list_contains_check
              status: pass
              expected:
                - structural_properties: { $contains: "Name" }
              traces:
                - Run: { operation: resolve_entity }
                - Event: { name: entity_name, value: "Customer" }
                - Event: { name: key_properties, value: ["ID"] }
                - Event: { name: structural_properties, value: ["ID", "Name", "Email"] }
            - name: list_size_check
              status: pass
              expected:
                - structural_properties: { $size: 3 }
              traces:
                - Run: { operation: resolve_entity }
                - Event: { name: entity_name, value: "Customer" }
                - Event: { name: key_properties, value: ["ID"] }
                - Event: { name: structural_properties, value: ["ID", "Name", "Email"] }
            - name: list_any_operator
              status: pass
              expected:
                - key_properties: { $any: "ID" }
              traces:
                - Run: { operation: resolve_entity }
                - Event: { name: entity_name, value: "Customer" }
                - Event: { name: key_properties, value: ["ID"] }
                - Event: { name: structural_properties, value: ["ID", "Name", "Email"] }
            - name: list_wrong_value_fails
              status: fail
              expected:
                - key_properties: ["NonexistentKey"]
              traces:
                - Run: { operation: resolve_entity }
                - Event: { name: entity_name, value: "Customer" }
                - Event: { name: key_properties, value: ["ID"] }
                - Event: { name: structural_properties, value: ["ID", "Name", "Email"] }

  - name: structured_map_matching
    desc: Map outputs match with key-value, subset, $size operators
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/structured_map.spec.yaml
    expected:
      outcome:
        Complete:
          results:
            - name: map_key_value_match
              status: pass
              expected:
                - $result: {"ID": "1", "Name": "Customer"}
              traces:
                - Run: { operation: get_entity_values }
                - Event: { name: get_entity_values.id, value: "1" }
                - Event: { name: $result, value: {"ID": "1", "Name": "Customer", "Email": "cust@example.com"} }
            - name: map_subset_match
              status: pass
              expected:
                - $result: {"ID": "1"}
              traces:
                - Run: { operation: get_entity_values }
                - Event: { name: get_entity_values.id, value: "1" }
                - Event: { name: $result, value: {"ID": "1", "Name": "Customer", "Email": "cust@example.com"} }
            - name: map_wrong_value_fails
              status: fail
              expected:
                - $result: {"ID": "999"}
              traces:
                - Run: { operation: get_entity_values }
                - Event: { name: get_entity_values.id, value: "1" }
                - Event: { name: $result, value: {"ID": "1", "Name": "Customer", "Email": "cust@example.com"} }
            - name: map_size_check
              status: pass
              expected:
                - $result: { $size: 3 }
              traces:
                - Run: { operation: get_entity_values }
                - Event: { name: get_entity_values.id, value: "1" }
                - Event: { name: $result, value: {"ID": "1", "Name": "Customer", "Email": "cust@example.com"} }

  - name: structured_set_matching
    desc: Set outputs match with $set presence, $contains, $size operators
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/structured_set.spec.yaml
    expected:
