# yaml-language-server: $schema=../binding-schema.json
# Binding: Rust implementation
# All paths are relative to this file (bindings/rust.yaml)
#
# Targets are addressed by name. A spec selects a target via its target:
# field (or per-case target:). Non-command targets need only a package_root;
# the harness finds the implementation by scanning that package for the
# #[spec_operation("<name>")] matching each case's operation key.

language: rust

targets:
  run_spec:
    package_root: ../test/rust/crates/specgate-selfhost

  validate_spec:
    package_root: ../rust/crates/specgate-types
    test_root: ../rust/crates/specgate-types/tests
    function: specgate_types::validate_spec_document

  mechanism_proof:
    package_root: ../rust/crates/specgate-harness
    command: cargo test --test mechanism_proof

  check_fixtures:
    package_root: ../test/rust/crates/specgate-fixtures
    command: cargo check