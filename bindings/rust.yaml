# yaml-language-server: $schema=../binding-schema.json
# Binding: Rust implementation
# All paths are relative to this file (bindings/rust.yaml)
#
# Targets are addressed by name. When a spec uses `binding: bindings/rust.yaml`
# without specifying a target, the harness selects the **first** target listed
# below as the default — currently `harness`, which points at the harness crate.

language: rust

targets:
  run_spec:
    package_root: ../rust/crates/specgate-harness
    function: specgate_harness::run_spec

  validate_spec:
    package_root: ../rust/crates/specgate-types
    test_root: ../rust/crates/specgate-types/tests
    function: specgate_types::validate_spec_document

  mechanism_proof:
    package_root: ../rust/crates/specgate-harness
    command: cargo test --test mechanism_proof

  check_fixtures:
    package_root: ../test/rust/crates/specgate-fixtures
    command: cargo check
