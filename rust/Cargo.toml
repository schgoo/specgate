[workspace]
members = [
    "crates/specgate-harness",
    "crates/specgate-rust-backend",
    "crates/specgate-types",
]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
serde_yaml = "0.9.34"
time = { version = "0.3.44", features = ["formatting"] }
