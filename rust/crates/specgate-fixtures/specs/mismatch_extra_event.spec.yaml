# yaml-language-server: $schema=../../../../spec-schema.json
# Mismatch: expected 2 events but actual has 4 (spec omits inputs)
name: fixture.mismatch_extra_event
binding: binding.yaml
outcome: Complete
outputs:
  when Complete:
    traces: List<TraceEvent>
types:
  TraceEvent:
    oneof:
      Event: { name: string, value: string }
      Run: { operation: string }
cases:
  - name: add_2_3
    desc: Expects fewer events than the implementation produces
    operation: add
    inputs: { a: 2, b: 3 }
    expected:
      outcome: Complete
      traces:
        - Run: { operation: add }
        - Event: { name: add.result, value: "5" }
