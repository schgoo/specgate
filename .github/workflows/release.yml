name: Release

permissions:
  contents: write

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.86.0"

      # Publish in dependency order
      - name: Publish specgate-runtime
        working-directory: rust
        run: cargo publish -p specgate-runtime --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index
        run: sleep 30
      - name: Publish specgate-annotations-macros
        working-directory: rust
        run: cargo publish -p specgate-annotations-macros --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index
        run: sleep 30
      - name: Publish specgate-annotations
        working-directory: rust
        run: cargo publish -p specgate-annotations --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index
        run: sleep 30
      - name: Publish specgate-types
        working-directory: rust
        run: cargo publish -p specgate-types --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index
        run: sleep 30
      - name: Publish specgate-harness
        working-directory: rust
        run: cargo publish -p specgate-harness --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index
        run: sleep 30
      - name: Publish specgate
        working-directory: rust
        run: cargo publish -p specgate --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index
        run: sleep 30
      - name: Publish specgate-cli
        working-directory: rust
        run: cargo publish -p specgate-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: specgate-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: specgate-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: specgate-macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.86.0"
          targets: ${{ matrix.target }}
      - name: Build release binary
        working-directory: rust
        run: cargo build --release -p specgate-cli --target ${{ matrix.target }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust/target/${{ matrix.target }}/release/specgate${{ matrix.os == 'windows-latest' && '.exe' || '' }}
