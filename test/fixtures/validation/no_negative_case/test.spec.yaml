spec_version: "0.4.0"
name: test.no_negative_case
binding: ../_common/binding.yaml
operations:
  parse:
    inputs: { input: string }
    outputs: [parse.outcome, parse.result, parse.error]
cases:
  - name: valid_input
    desc: Valid input parses successfully
    level: must
    source:
      assertion_ids: [SPEC-MUST-1]
      spec: "Test Spec"
      section: "§2"
    operation: parse
    inputs: { input: "good" }
    expected:
      - parse.outcome: "Ok"
      - parse.result: "good"
