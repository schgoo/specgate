spec_version: "0.4.0"
name: fixture.vacuous_match
binding: binding.yaml

operations:
  add:
    inputs: { a: i32, b: i32 }
    outputs: [add.result]

cases:
  - name: wrong_value_fails
    desc: Declared output with wrong value must fail
    operation: add
    inputs: { a: 2, b: 3 }
    expected:
      - add.result: "999"

  - name: wrong_run_fails
    desc: $run for non-matching operation must fail
    operation: add
    inputs: { a: 2, b: 3 }
    expected:
      - $run: nonexistent_operation
