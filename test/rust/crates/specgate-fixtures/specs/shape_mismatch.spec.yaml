spec_version: "0.3.0"
name: fixture.shape_mismatch
binding: binding.yaml

operations:
  add:
    inputs: { a: i32, b: i32 }
    outputs: [add.result]

cases:
  - name: wrong_output_name
    desc: Expected uses 'answer' which is not a declared output
    operation: add
    inputs: { a: 2, b: 3 }
    expected:
      - answer: "5"
