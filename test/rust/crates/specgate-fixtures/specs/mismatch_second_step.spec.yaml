spec_version: "0.3.0"
name: fixture.mismatch_second_step
binding: binding.yaml

operations:
  make_counter:
    kind: setup
    outputs:
      when Complete:
        returns: Counter
  increment:
    desc: Increments the counter by 1.
  decrement:
    desc: Decrements the counter by 1.

cases:
  - name: increment_then_decrement
    desc: Wrong value after second step
    setup: make_counter
    steps:
      - operation: increment
      - operation: decrement
    expected:
      - run: decrement
      - count: "999"
