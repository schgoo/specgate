spec_version: "0.4.0"
name: fixture.mismatch_second_step
binding: binding.yaml

operations:
  increment:
    outputs: [count]
  decrement:
    outputs: [count]

cases:
  - name: increment_then_decrement
    desc: Wrong value after second step
    steps:
      - operation: increment
      - operation: decrement
    expected:
      - $run: decrement
      - count: "999"
