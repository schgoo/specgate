spec_version: "0.3.0"
name: fixture.mismatch_second_step
binding: binding.yaml

operations:
  make_counter:
    kind: setup
  increment:
    outputs: [count]
  decrement:
    outputs: [count]

cases:
  - name: increment_then_decrement
    desc: Wrong value after second step
    setup: make_counter
    steps:
      - operation: increment
      - operation: decrement
    expected:
      - run: decrement
      - count: "999"
