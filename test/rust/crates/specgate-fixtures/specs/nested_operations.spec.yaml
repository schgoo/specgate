name: fixture.nested_operations
binding: binding.yaml
cases:
  - name: transfer_50
    desc: Transfer calls withdraw then deposit
    setup: make_account
    operation: transfer
    inputs: { amount: 50 }
    expected:
      - balance: "100"
      - run: transfer
      - run: withdraw
      - balance: "50"
      - run: deposit
      - balance: "100"