spec_version: "0.4.0"
name: fixture.nested_operations
binding: binding.yaml

operations:
  transfer:
    inputs: { amount: i32 }
    outputs: [balance]
  withdraw:
    inputs: { amount: i32 }
    outputs: [balance]
  deposit:
    inputs: { amount: i32 }
    outputs: [balance]

cases:
  - name: transfer_50
    desc: Transfer calls withdraw then deposit
    operation: transfer
    inputs: { amount: 50 }
    expected:
      - balance: "100"
      - $run: transfer
      - $run: withdraw
      - balance: "50"
      - $run: deposit
      - balance: "100"
