spec_version: "0.4.0"
name: fixture.setup_with_params
binding: binding.yaml

operations:
  increment:
    inputs: { initial: i32 }
    outputs: [count]

cases:
  - name: start_at_10
    desc: Counter starting at 10 becomes 11 after increment
    operation: increment
    inputs: { initial: 10 }
    expected:
      - count: "10"
      - $run: increment
      - count: "11"
