spec_version: "0.4.0"
name: fixture.statemachine_counter_wrong
binding: binding.yaml

operations:
  make_counter:
    kind: setup
  increment:
    outputs: [count]

cases:
  - name: increment_once
    desc: Wrong expected — 999 instead of 1
    setup: make_counter
    operation: increment
    expected:
      - count: "999"
