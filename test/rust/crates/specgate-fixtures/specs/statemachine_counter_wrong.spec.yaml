spec_version: "0.3.0"
name: fixture.statemachine_counter_wrong
binding: binding.yaml

operations:
  make_counter:
    kind: setup
    outputs:
      when Complete:
        returns: Counter
  increment:
    desc: Increments the counter by 1.

cases:
  - name: increment_once
    desc: Wrong expected — 999 instead of 1
    setup: make_counter
    operation: increment
    expected:
      - count: "999"
