spec_version: "0.4.0"
name: fixture.unordered_fields
binding: binding.yaml

operations:
  make_account:
    kind: setup
  withdraw:
    inputs: { amount: i32 }
    outputs: [balance, transaction_count]

cases:
  - name: unordered_both_present
    desc: Both fields matched in any order
    setup: make_account
    operation: withdraw
    inputs: { amount: 50 }
    expected:
      - $run: withdraw
      - $unordered:
        - balance: "50"
        - transaction_count: "1"

  - name: unordered_reversed_still_passes
    desc: Fields listed in reverse of emission order still pass
    setup: make_account
    operation: withdraw
    inputs: { amount: 50 }
    expected:
      - $run: withdraw
      - $unordered:
        - transaction_count: "1"
        - balance: "50"

  - name: unordered_wrong_value_fails
    desc: One field has wrong value — should fail
    setup: make_account
    operation: withdraw
    inputs: { amount: 50 }
    expected:
      - $run: withdraw
      - $unordered:
        - balance: "999"
        - transaction_count: "1"

  - name: unordered_multiple_blocks
    desc: Two separate unordered blocks in one case
    setup: make_account
    operation: withdraw
    inputs: { amount: 50 }
    expected:
      - $unordered:
        - balance: "100"
        - transaction_count: "0"
      - $run: withdraw
      - $unordered:
        - balance: "50"
        - transaction_count: "1"
