spec_version: "0.3.0"
name: fixture.stateless_add
binding: binding.yaml

operations:
  add:
    inputs: { a: { type: i32 }, b: { type: i32 } }
    outcome:
      oneof: [Complete]
    outputs:
      when Complete:
        result: i32

cases:
  - name: add_2_3
    desc: Adding 2 + 3 returns 5
    operation: add
    inputs: { a: 2, b: 3 }
    expected:
      - add.result: "5"
