spec_version: "0.3.0"
name: fixture.readonly_operation
binding: binding.yaml

operations:
  make_counter:
    kind: setup
  get_count:
    outputs: [get_count.result]

cases:
  - name: read_count
    desc: Read-only operation returns value without state change
    setup: make_counter
    operation: get_count
    expected:
      - get_count.result: "42"
