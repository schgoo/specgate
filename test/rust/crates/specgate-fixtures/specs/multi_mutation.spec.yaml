spec_version: "0.3.0"
name: fixture.multi_mutation
binding: binding.yaml

operations:
  make_counter:
    kind: setup
    outputs:
      when Complete:
        returns: Counter
  increment_twice:
    desc: Increments the counter twice in one operation.

cases:
  - name: double_increment
    desc: Count goes from 0 to 2 via two mutations
    setup: make_counter
    operation: increment_twice
    expected:
      - count: "0"
      - run: increment_twice
      - count: "1"
      - count: "2"
