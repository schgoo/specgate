spec_version: "0.4.0"
name: fixture.missing_target
binding: binding_multi.yaml
target: nonexistent

operations:
  add:
    inputs: { a: i32, b: i32 }
    outputs: [$result]

cases:
  - name: should_error
    desc: Target doesnt exist in binding
    operation: add
    inputs: { a: 1, b: 2 }
    expected:
      - $result: "3"
