spec_version: "0.4.0"
name: fixture.property_invalid_generators
binding: binding.yaml

operations:
  add:
    inputs: { a: i32, b: i32 }
    outputs: [$result]

cases:
  - name: invalid_generator_type
    kind: property
    runs: 10
    generators:
      a: unknown_type[0, 10]
    calls:
      result: { operation: add, inputs: { a: "{a}", b: 0 } }
    expected:
      - $assert: "result.$result == a"
