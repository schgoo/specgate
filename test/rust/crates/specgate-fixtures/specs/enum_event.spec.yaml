spec_version: 0.4.0
name: fixture.enum_event
binding: binding.yaml
operations:
  classify:
    inputs:
      sides: i32
    outputs:
    - $result: Shape
cases:
- name: unit_variant
  desc: Unit enum variant
  operation: classify
  inputs:
    sides: 0
  expected:
  - $result:
      Point: {}
- name: single_field_variant
  desc: Struct variant with one field
  operation: classify
  inputs:
    sides: 1
  expected:
  - $result:
      Circle:
        radius: '5'
- name: multi_field_variant
  desc: Struct variant with multiple fields
  operation: classify
  inputs:
    sides: 4
  expected:
  - $result:
      Rectangle:
        width: '3'
        height: '4'
