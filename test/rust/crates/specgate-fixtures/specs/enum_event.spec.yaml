spec_version: "0.4.0"
name: fixture.enum_event
binding: binding.yaml

operations:
  classify:
    inputs: { sides: i32 }
    outputs: [shape, shape.radius, shape.width, shape.height]

cases:
  - name: unit_variant
    desc: Unit enum variant emits just the variant name
    operation: classify
    inputs: { sides: 0 }
    expected:
      - shape: "Point"

  - name: single_field_variant
    desc: Struct variant with one field emits variant + field
    operation: classify
    inputs: { sides: 1 }
    expected:
      - shape: "Circle"
      - shape.radius: "5"

  - name: multi_field_variant
    desc: Struct variant with multiple fields emits variant + all fields
    operation: classify
    inputs: { sides: 4 }
    expected:
      - shape: "Rectangle"
      - shape.width: "3"
      - shape.height: "4"
