spec_version: "0.3.0"
name: fixture.subsequence_with_gaps
binding: binding.yaml

operations:
  make_counter:
    kind: setup
    outputs:
      when Complete:
        returns: Counter
  increment_twice:
    desc: Increments the counter twice in one operation.

cases:
  - name: double_increment
    desc: Assert count=0 then count=2, skipping the intermediate count=1
    setup: make_counter
    operation: increment_twice
    expected:
      - count: "0"
      - count: "2"
