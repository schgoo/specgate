spec_version: "0.4.0"
name: fixture.result_ok
binding: binding.yaml

operations:
  divide:
    inputs: { a: i32, b: i32 }
    outputs: [$outcome, $result]

cases:
  - name: divide_10_by_2
    desc: Successful division
    operation: divide
    inputs: { a: 10, b: 2 }
    expected:
      - $outcome: "Ok"
      - $result: "5"
