spec_version: "0.4.0"
name: fixture.statemachine_counter
binding: binding.yaml

operations:
  increment:
    outputs: [count]

cases:
  - name: increment_once
    desc: Incrementing counter from 0 produces count 1
    operation: increment
    expected:
      - count: "0"
      - $run: increment
      - count: "1"
