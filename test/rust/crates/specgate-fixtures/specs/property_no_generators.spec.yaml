spec_version: "0.4.0"
name: fixture.property_no_generators
binding: binding.yaml

operations:
  add:
    inputs: { a: i32, b: i32 }
    outputs: [$result]

cases:
  - name: missing_generators
    kind: property
    runs: 10
    calls:
      result: { operation: add, inputs: { a: 1, b: 2 } }
    expected:
      - $assert: "result.$result == 3"
