spec_version: "0.4.0"
name: fixture.multi_setup
binding: binding.yaml

operations:
  transfer:
    inputs: { amount: i32 }
    outputs: [source.balance, target.balance]

cases:
  - name: transfer_between_accounts
    desc: Two setups create source and target accounts
    operation: transfer
    inputs: { amount: 50 }
    expected:
      - source.balance: "100"
      - target.balance: "0"
      - $run: transfer
      - source.balance: "50"
      - target.balance: "50"
