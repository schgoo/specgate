spec_version: "0.4.0"
name: fixture.void_operation
binding: binding.yaml

operations:
  log:
    inputs: { msg: string }
    outputs: [count]

cases:
  - name: log_a_message
    desc: Logging increments count with no return value
    operation: log
    inputs: { msg: "hello" }
    expected:
      - count: "0"
      - $run: log
      - count: "1"
