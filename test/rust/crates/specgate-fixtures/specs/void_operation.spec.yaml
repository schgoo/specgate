spec_version: "0.3.0"
name: fixture.void_operation
binding: binding.yaml

operations:
  make_logger:
    kind: setup
    outputs:
      when Complete:
        returns: Logger
  log:
    inputs: { msg: { type: string } }

cases:
  - name: log_a_message
    desc: Logging increments count with no return value
    setup: make_logger
    operation: log
    inputs: { msg: "hello" }
    expected:
      - count: "0"
      - run: log
      - count: "1"
