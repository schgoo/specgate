spec_version: "0.4.0"
name: fixture.multi_field_capture
binding: binding.yaml

operations:
  withdraw:
    inputs: { amount: i32 }
    outputs: [balance, transaction_count]

cases:
  - name: withdraw_50
    desc: Withdrawing 50 from account with balance 100
    operation: withdraw
    inputs: { amount: 50 }
    expected:
      - balance: "100"
      - $run: withdraw
      - balance: "50"
      - transaction_count: "1"
