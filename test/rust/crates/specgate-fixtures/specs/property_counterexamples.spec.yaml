spec_version: "0.4.0"
name: fixture.property_counterexamples
binding: binding.yaml

operations:
  identity_i32:
    inputs: { x: i32 }
    outputs: [$result]
  identity_f64:
    inputs: { x: f64 }
    outputs: [$result]
  identity_bool:
    inputs: { x: bool }
    outputs: [$result]
  identity_string:
    inputs: { x: string }
    outputs: [$result]
  sum_list:
    inputs: { items: list }
    outputs: [$result]
  set_size:
    inputs: { items: set }
    outputs: [$result]
  map_keys:
    inputs: { data: map }
    outputs: [$result]

cases:
  # Each case has an assertion that is NOT always true,
  # so proptest will find a counterexample.

  - name: counter_i32
    kind: property
    runs: 100
    generators:
      x: i32[-1000, 1000]
    calls:
      result: { operation: identity_i32, inputs: { x: "{x}" } }
    expected:
      - $assert: "result.$result > 0"

  - name: counter_f64
    kind: property
    runs: 100
    generators:
      x: f64[-100.0, 100.0]
    calls:
      result: { operation: identity_f64, inputs: { x: "{x}" } }
    expected:
      - $assert: "result.$result > 50.0"

  - name: counter_bool
    kind: property
    runs: 100
    generators:
      x: bool
    calls:
      result: { operation: identity_bool, inputs: { x: "{x}" } }
    expected:
      - $assert: "result.$result == true"

  - name: counter_string
    kind: property
    runs: 100
    generators:
      s: string[1, 50]
    calls:
      result: { operation: identity_string, inputs: { x: "{s}" } }
    expected:
      - $assert: "result.$result == \"hello\""

  - name: counter_oneof
    kind: property
    runs: 100
    generators:
      choice: oneof["alpha", "beta", "gamma"]
    calls:
      result: { operation: identity_string, inputs: { x: "{choice}" } }
    expected:
      - $assert: "result.$result == \"alpha\""

  - name: counter_list
    kind: property
    runs: 100
    generators:
      items: "list[i32[0, 100], len: 1..10]"
    calls:
      result: { operation: sum_list, inputs: { items: "{items}" } }
    expected:
      - $assert: "result.$result == 0"

  - name: counter_set
    kind: property
    runs: 100
    generators:
      items: "set[i32[0, 100], size: 3..8]"
    calls:
      result: { operation: set_size, inputs: { items: "{items}" } }
    expected:
      - $assert: "result.$result == 3"

  - name: counter_map
    kind: property
    runs: 100
    generators:
      data: "map[string[1, 10], i32[0, 100], size: 1..5]"
    calls:
      result: { operation: map_keys, inputs: { data: "{data}" } }
    expected:
      - $assert: "result.$result == 1"
