spec_version: "0.3.0"
name: fixture.unrecoverable
binding: binding.yaml

operations:
  divide:
    inputs: { a: { type: i32 }, b: { type: i32 } }
    outcome:
      oneof: [Ok, Unrecoverable]
    outputs:
      when Ok:
        result: i32
      when Unrecoverable:
        error: string

cases:
  - name: divide_by_zero_panics
    desc: Division by zero panics
    operation: divide
    inputs: { a: 10, b: 0 }
    expected:
      - divide.outcome: "Unrecoverable"
      - divide.error: "attempt to divide by zero"
