spec_version: 0.4.0
name: fixture.unrecoverable
binding: binding.yaml
operations:
  divide:
    inputs:
      a: i32
      b: i32
    outputs:
    - $result: i32
cases:
- name: divide_by_zero_panics
  desc: Division by zero panics (fault)
  operation: divide
  inputs:
    a: 10
    b: 0
  expected:
  - $fault: attempt to divide by zero
