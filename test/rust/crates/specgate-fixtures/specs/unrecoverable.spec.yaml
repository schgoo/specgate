spec_version: "0.4.0"
name: fixture.unrecoverable
binding: binding.yaml

operations:
  divide:
    inputs: { a: i32, b: i32 }
    outputs: [divide.outcome, divide.error]

cases:
  - name: divide_by_zero_panics
    desc: Division by zero panics
    operation: divide
    inputs: { a: 10, b: 0 }
    expected:
      - divide.outcome: "Unrecoverable"
      - divide.error: "attempt to divide by zero"
