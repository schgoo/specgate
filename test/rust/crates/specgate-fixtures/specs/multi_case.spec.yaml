spec_version: "0.4.0"
name: fixture.multi_case
binding: binding.yaml

operations:
  add:
    inputs: { a: i32, b: i32 }
    outputs: [add.result]

cases:
  - name: add_2_3
    desc: Adding 2 + 3 returns 5
    operation: add
    inputs: { a: 2, b: 3 }
    expected:
      - add.result: "5"
  - name: add_10_20
    desc: Adding 10 + 20 returns 30
    operation: add
    inputs: { a: 10, b: 20 }
    expected:
      - add.result: "30"
