spec_version: "0.4.0"
name: fixture.option_some
binding: binding.yaml

operations:
  find:
    inputs: { items: "List<i32>", target: i32 }
    outputs: [$result]

cases:
  - name: find_existing
    desc: Finding an existing element returns Some with index
    operation: find
    inputs: { items: [10, 20, 30], target: 20 }
    expected:
      - $result: "1"
