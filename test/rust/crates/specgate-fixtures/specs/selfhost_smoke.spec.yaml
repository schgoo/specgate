spec_version: "0.4.0"
name: fixture.selfhost_smoke
binding: binding.yaml

# Self-host proof: the harness runs ITS OWN run_spec operation, which invokes
# specgate_harness::run_spec on a real fixture and returns the structured
# outcome. Validates that a complex RunOutcome-shaped value emits as $result
# and matches via the structured matchers.
operations:
  run_spec:
    inputs:
      spec: string
    outputs:
      - $result: SelfHostOutcome

cases:
  - name: runs_stateless_add_fixture
    desc: run_spec on a passing fixture returns Complete with a passing case
    operation: run_spec
    inputs:
      spec: test/rust/crates/specgate-fixtures/specs/stateless_add.spec.yaml
    expected:
      - $result:
          Complete:
            results:
              - name: add_2_3
                status: pass
                traces:
                  - Run: { operation: add }
                  - Event: { name: add.a, value: "2" }
                  - Event: { name: add.b, value: "3" }
                  - Event: { name: $result, value: "5" }
