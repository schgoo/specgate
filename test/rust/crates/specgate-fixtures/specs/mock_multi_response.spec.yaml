spec_version: "0.3.0"
name: fixture.mock_multi_response
binding: binding.yaml

operations:
  make_service:
    kind: setup
  get_users:
    inputs: { id_a: string, id_b: string }
    outputs: [db.request, db.response, get_users.result]

cases:
  - name: get_two_different_users
    desc: Mock returns different values for different inputs
    setup: make_service
    operation: get_users
    inputs:
      id_a: "user_1"
      id_b: "user_2"
      db:
        "user_1": "Alice"
        "user_2": "Bob"
    expected:
      - run: get_users
      - db.request: "user_1"
      - db.response: "Alice"
      - db.request: "user_2"
      - db.response: "Bob"
      - get_users.result: "Alice and Bob"
