# yaml-language-server: $schema=../../../../spec-schema.json
# Mismatch: event placed in wrong Run group (count=1 before Run instead of after)
name: fixture.mismatch_wrong_order
binding: binding.yaml
outcome: Complete
outputs:
  when Complete:
    traces: List<TraceEvent>
types:
  TraceEvent:
    oneof:
      Event: { name: string, value: string }
      Run: { operation: string }
cases:
  - name: increment_once
    desc: count=1 placed before the Run instead of after
    setup: make_counter
    operation: increment
    expected:
      outcome: Complete
      traces:
        - Event: { name: count, value: "0" }
        - Event: { name: count, value: "1" }
        - Run: { operation: increment }
