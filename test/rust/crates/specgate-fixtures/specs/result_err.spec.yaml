spec_version: "0.4.0"
name: fixture.result_err
binding: binding.yaml

operations:
  divide:
    inputs: { a: i32, b: i32 }
    outputs: [$outcome, $error]

cases:
  - name: divide_by_zero
    desc: Division by zero returns error
    operation: divide
    inputs: { a: 10, b: 0 }
    expected:
      - $outcome: "Error"
      - $error: "division by zero"
