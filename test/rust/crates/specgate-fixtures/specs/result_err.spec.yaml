spec_version: "0.3.0"
name: fixture.result_err
binding: binding.yaml

operations:
  divide:
    inputs: { a: i32, b: i32 }
    outputs: [divide.outcome, divide.error]

cases:
  - name: divide_by_zero
    desc: Division by zero returns error
    operation: divide
    inputs: { a: 10, b: 0 }
    expected:
      - divide.outcome: "Error"
      - divide.error: "division by zero"
