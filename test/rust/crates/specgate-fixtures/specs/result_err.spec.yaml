spec_version: "0.3.0"
name: fixture.result_err
binding: binding.yaml

operations:
  divide:
    inputs: { a: { type: i32 }, b: { type: i32 } }
    outcome:
      oneof: [Ok, Error]
    outputs:
      when Ok:
        result: i32
      when Error:
        error: string

cases:
  - name: divide_by_zero
    desc: Division by zero returns error
    operation: divide
    inputs: { a: 10, b: 0 }
    expected:
      - divide.outcome: "Error"
      - divide.error: "division by zero"
