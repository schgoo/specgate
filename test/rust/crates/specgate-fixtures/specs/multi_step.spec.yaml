spec_version: "0.3.0"
name: fixture.multi_step
binding: binding.yaml

operations:
  make_counter:
    kind: setup
  increment:
    outputs: [count]
  decrement:
    outputs: [count]

cases:
  - name: increment_then_decrement
    desc: Count goes 0 to 1 to 0
    setup: make_counter
    steps:
      - operation: increment
      - operation: decrement
    expected:
      - count: "0"
      - run: increment
      - count: "1"
      - run: decrement
      - count: "0"
