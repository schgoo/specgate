spec_version: "0.4.0"
name: fixture.command_target
binding: binding_command.yaml
target: check

operations:
  check:
    kind: command
  check_fail:
    kind: command

cases:
  - name: command_succeeds
    desc: Command target runs a shell command and passes when it exits 0
    operation: check
    expected:
      - $outcome: "Complete"

  - name: command_fails
    desc: Command target reports Error when the shell command exits non-zero
    target: check_fail
    operation: check_fail
    expected:
      - $outcome: "Error"