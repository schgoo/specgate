spec_version: "0.4.0"
name: fixture.mock_field
binding: binding.yaml

operations:
  make_service:
    kind: setup
  get_user:
    inputs: { id: string }
    outputs: [db.request, db.response, get_user.result]

cases:
  - name: find_user_1
    desc: Mock db returns Alice
    setup: make_service
    operation: get_user
    inputs:
      id: "user_1"
      db:
        "user_1": "Alice"
    expected:
      - $run: get_user
      - db.request: "user_1"
      - db.response: "Alice"
      - $result: "Alice"
