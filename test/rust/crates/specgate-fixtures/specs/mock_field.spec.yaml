name: fixture.mock_field
binding: binding.yaml
cases:
  - name: find_user_1
    desc: Mock db returns Alice
    setup: make_service
    operation: get_user
    inputs:
      id: "user_1"
      db:
        "user_1": "Alice"
    expected:
      - run: get_user
      - db.request: "user_1"
      - db.response: "Alice"
      - get_user.result: "Alice"