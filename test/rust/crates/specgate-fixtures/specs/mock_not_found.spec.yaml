name: fixture.mock_not_found
binding: binding.yaml
cases:
  - name: query_unknown_user
    desc: Mock table has no entry for input
    setup: make_service
    operation: get_user
    inputs:
      id: "user_99"
      db:
        "user_1": "Alice"
    expected:
      - db.request: "user_99"
      - db.error: "no mock response for input 'user_99'"