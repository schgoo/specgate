spec_version: "0.4.0"
name: fixture.mock_not_found
binding: binding.yaml

operations:
  make_service:
    kind: setup
  get_user:
    inputs: { id: string }
    outputs: [db.request, db.error]

cases:
  - name: query_unknown_user
    desc: Mock called with input not in table
    setup: make_service
    operation: get_user
    inputs:
      id: "user_99"
      db: {}
    expected:
      - db.request: "user_99"
      - db.error: "no mock response for input 'user_99'"
